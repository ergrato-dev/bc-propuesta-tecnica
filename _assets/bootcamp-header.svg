<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <!-- ── Fondo principal ───────────────────────────────────── -->
  <rect width="800" height="200" fill="#0D1117"/>

  <!-- Franja izquierda de acento -->
  <rect x="0" y="0" width="5" height="200" fill="#1565C0"/>

  <!-- Separador vertical central -->
  <line x1="490" y1="20" x2="490" y2="180" stroke="#21262D" stroke-width="1"/>

  <!-- ── SECCIÓN IZQUIERDA ─────────────────────────────────── -->

  <!-- Ícono: documento con esquina doblada -->
  <rect x="26" y="26" width="36" height="44" rx="2" fill="#161B22" stroke="#1565C0" stroke-width="1.5"/>
  <polygon points="50,26 62,38 50,38" fill="#0D1117" stroke="#1565C0" stroke-width="1.5"/>
  <line x1="32" y1="44" x2="56" y2="44" stroke="#1565C0" stroke-width="2" stroke-linecap="round"/>
  <line x1="32" y1="52" x2="56" y2="52" stroke="#1565C0" stroke-width="2" stroke-linecap="round"/>
  <line x1="32" y1="60" x2="46" y2="60" stroke="#1565C0" stroke-width="2" stroke-linecap="round"/>

  <!-- Título principal -->
  <text x="76" y="50" font-family="Inter, Roboto, 'Open Sans', system-ui, sans-serif"
        font-size="23" font-weight="700" fill="#E6EDF3" letter-spacing="-0.5">
    Bootcamp Propuesta Técnica
  </text>

  <!-- Subtítulo -->
  <text x="76" y="72" font-family="Inter, Roboto, 'Open Sans', system-ui, sans-serif"
        font-size="14" font-weight="400" fill="#8B949E">
    Zero to Hero · SENA ADSO
  </text>

  <!-- Línea separadora bajo encabezado -->
  <line x1="26" y1="88" x2="460" y2="88" stroke="#21262D" stroke-width="1"/>

  <!-- Descripción -->
  <text x="26" y="108" font-family="Inter, Roboto, 'Open Sans', system-ui, sans-serif"
        font-size="12" fill="#8B949E">
    De cero a elaborar y defender una propuesta técnica profesional completa
  </text>

  <!-- ── Badges ─────────────────────────────────────────────── -->

  <!-- 9 Semanas -->
  <rect x="26" y="124" width="90" height="22" rx="4" fill="#1C2A3A"/>
  <text x="71" y="139" font-family="Inter, Roboto, 'Open Sans', system-ui, sans-serif"
        font-size="11" fill="#58A6FF" text-anchor="middle">📅  9 Semanas</text>

  <!-- 54 Horas -->
  <rect x="124" y="124" width="82" height="22" rx="4" fill="#1C2A3A"/>
  <text x="165" y="139" font-family="Inter, Roboto, 'Open Sans', system-ui, sans-serif"
        font-size="11" fill="#58A6FF" text-anchor="middle">⏱  54 Horas</text>

  <!-- PMI / IEEE -->
  <rect x="214" y="124" width="80" height="22" rx="4" fill="#1C2A3A"/>
  <text x="254" y="139" font-family="Inter, Roboto, 'Open Sans', system-ui, sans-serif"
        font-size="11" fill="#58A6FF" text-anchor="middle">📐  PMI · IEEE</text>

  <!-- 2 Versiones -->
  <rect x="302" y="124" width="98" height="22" rx="4" fill="#1C2A3A"/>
  <text x="351" y="139" font-family="Inter, Roboto, 'Open Sans', system-ui, sans-serif"
        font-size="11" fill="#58A6FF" text-anchor="middle">🎓  2 Versiones</text>

  <!-- Colombia -->
  <rect x="408" y="124" width="76" height="22" rx="4" fill="#1C2A3A"/>
  <text x="446" y="139" font-family="Inter, Roboto, 'Open Sans', system-ui, sans-serif"
        font-size="11" fill="#58A6FF" text-anchor="middle">🇨🇴  Colombia</text>

  <!-- Nota al pie izquierda -->
  <text x="26" y="176" font-family="Inter, Roboto, 'Open Sans', system-ui, sans-serif"
        font-size="10.5" fill="#484F58">
    Oferta Abierta  ·  Cadena de Formación  ·  Proyecto real desde la semana 1
  </text>

  <!-- ── SECCIÓN DERECHA — Panel de propuesta ──────────────── -->

  <!-- Fondo del panel -->
  <rect x="500" y="18" width="282" height="164" rx="6" fill="#161B22" stroke="#21262D" stroke-width="1"/>

  <!-- Barra de título del panel -->
  <rect x="500" y="18" width="282" height="28" rx="6" fill="#1565C0"/>
  <rect x="500" y="34" width="282" height="12" fill="#1565C0"/>
  <text x="641" y="37" font-family="Inter, Roboto, 'Open Sans', system-ui, sans-serif"
        font-size="11" font-weight="600" fill="#FFFFFF" text-anchor="middle">
    propuesta-tecnica.md
  </text>

  <!-- Número de sección: color muted -->
  <!-- Fila 1 -->
  <text x="516" y="62" font-family="'Courier New', Courier, monospace"
        font-size="10.5" fill="#484F58">01</text>
  <text x="536" y="62" font-family="'Courier New', Courier, monospace"
        font-size="10.5" fill="#3FB950">✓</text>
  <text x="552" y="62" font-family="Inter, Roboto, 'Open Sans', system-ui, sans-serif"
        font-size="11" fill="#58A6FF" font-weight="600"># Alcance del Proyecto</text>

  <!-- Fila 2 -->
  <text x="516" y="79" font-family="'Courier New', Courier, monospace"
        font-size="10.5" fill="#484F58">02</text>
  <text x="536" y="79" font-family="'Courier New', Courier, monospace"
        font-size="10.5" fill="#3FB950">✓</text>
  <text x="552" y="79" font-family="Inter, Roboto, 'Open Sans', system-ui, sans-serif"
        font-size="11" fill="#E6EDF3"># Requisitos y WBS</text>

  <!-- Fila 3 -->
  <text x="516" y="96" font-family="'Courier New', Courier, monospace"
        font-size="10.5" fill="#484F58">03</text>
  <text x="536" y="96" font-family="'Courier New', Courier, monospace"
        font-size="10.5" fill="#3FB950">✓</text>
  <text x="552" y="96" font-family="Inter, Roboto, 'Open Sans', system-ui, sans-serif"
        font-size="11" fill="#E6EDF3"># Estimación de Esfuerzo</text>

  <!-- Fila 4 -->
  <text x="516" y="113" font-family="'Courier New', Courier, monospace"
        font-size="10.5" fill="#484F58">04</text>
  <text x="536" y="113" font-family="'Courier New', Courier, monospace"
        font-size="10.5" fill="#3FB950">✓</text>
  <text x="552" y="113" font-family="Inter, Roboto, 'Open Sans', system-ui, sans-serif"
        font-size="11" fill="#E6EDF3"># Plan de Costos y Presupuesto</text>

  <!-- Fila 5 -->
  <text x="516" y="130" font-family="'Courier New', Courier, monospace"
        font-size="10.5" fill="#484F58">05</text>
  <text x="536" y="130" font-family="'Courier New', Courier, monospace"
        font-size="10.5" fill="#3FB950">✓</text>
  <text x="552" y="130" font-family="Inter, Roboto, 'Open Sans', system-ui, sans-serif"
        font-size="11" fill="#E6EDF3"># Cronograma y Ruta Crítica</text>

  <!-- Fila 6 -->
  <text x="516" y="147" font-family="'Courier New', Courier, monospace"
        font-size="10.5" fill="#484F58">06</text>
  <text x="536" y="147" font-family="'Courier New', Courier, monospace"
        font-size="10.5" fill="#3FB950">✓</text>
  <text x="552" y="147" font-family="Inter, Roboto, 'Open Sans', system-ui, sans-serif"
        font-size="11" fill="#E6EDF3"># Gestión de Riesgos</text>

  <!-- Fila 7 -->
  <text x="516" y="164" font-family="'Courier New', Courier, monospace"
        font-size="10.5" fill="#484F58">07</text>
  <text x="536" y="164" font-family="'Courier New', Courier, monospace"
        font-size="10.5" fill="#3FB950">✓</text>
  <text x="552" y="164" font-family="Inter, Roboto, 'Open Sans', system-ui, sans-serif"
        font-size="11" fill="#E6EDF3"># Propuesta Comercial</text>

  <!-- Cursor parpadeante simulado en última línea -->
  <rect x="552" y="172" width="6" height="11" rx="1" fill="#1565C0" opacity="0.8"/>
</svg>
