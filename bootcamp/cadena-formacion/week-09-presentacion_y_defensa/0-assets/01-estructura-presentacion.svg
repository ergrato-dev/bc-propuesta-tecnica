<rect x="474" y="152" width="118" height="36" rx="4" fill="#150f28"/>
<text x="533" y="165" font-family="Inter, Roboto, sans-serif" font-size="8" fill="#c4b5fd" text-anchor="middle">Slide 10: Forma de</text>
<text x="533" y="178" font-family="Inter, Roboto, sans-serif" font-size="8" fill="#c4b5fd" text-anchor="middle">pago y garantia</text>
<text x="533" y="228" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#a78bfa" text-anchor="middle">Objetivo:</text>
<text x="533" y="241" font-family="Inter, Roboto, sans-serif" font-size="8" fill="#8b949e" text-anchor="middle">Presentar precio</text>
<text x="533" y="254" font-family="Inter, Roboto, sans-serif" font-size="8" fill="#8b949e" text-anchor="middle">como inversion</text>
<text x="533" y="267" font-family="Inter, Roboto, sans-serif" font-size="8" fill="#8b949e" text-anchor="middle">justificada</text>
<text x="533" y="303" font-family="Inter, Roboto, sans-serif" font-size="8" fill="#a78bfa" text-anchor="middle">2 slides</text>
<polygon points="610,204 602,199 602,209" fill="#8b949e"/>
<line x1="602" y1="204" x2="610" y2="204" stroke="#8b949e" stroke-width="1.5"/>
