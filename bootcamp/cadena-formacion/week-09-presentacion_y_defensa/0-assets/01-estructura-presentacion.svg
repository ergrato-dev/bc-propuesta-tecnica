<rect x="30" y="152" width="118" height="36" rx="4" fill="#0f2210"/>
<text x="89" y="165" font-family="Inter, Roboto, sans-serif" font-size="8" fill="#86efac" text-anchor="middle">Slide 2: El problema</text>
<text x="89" y="178" font-family="Inter, Roboto, sans-serif" font-size="8" fill="#8b949e" text-anchor="middle">del cliente</text>
<text x="89" y="214" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#56d364" text-anchor="middle">Objetivo:</text>
<text x="89" y="228" font-family="Inter, Roboto, sans-serif" font-size="8" fill="#8b949e" text-anchor="middle">Captar atencion</text>
<text x="89" y="241" font-family="Inter, Roboto, sans-serif" font-size="8" fill="#8b949e" text-anchor="middle">Demostrar que</text>
<text x="89" y="254" font-family="Inter, Roboto, sans-serif" font-size="8" fill="#8b949e" text-anchor="middle">entiendes el problema</text>
<text x="89" y="303" font-family="Inter, Roboto, sans-serif" font-size="8" fill="#56d364" text-anchor="middle">2 slides</text>
