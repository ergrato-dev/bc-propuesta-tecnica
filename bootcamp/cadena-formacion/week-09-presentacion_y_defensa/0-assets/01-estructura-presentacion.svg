<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
<rect width="800" height="400" fill="#0d1117"/>
<text x="400" y="24" font-family="Inter, Roboto, sans-serif" font-size="15" font-weight="700" fill="#e6edf3" text-anchor="middle">Estructura de la Presentacion Ejecutiva</text>
<text x="400" y="40" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">5 zonas para comunicar la propuesta tecnica en 15 minutos</text>
<line x1="60" y1="47" x2="740" y2="47" stroke="#1565C0" stroke-width="1.5" opacity="0.5"/>
