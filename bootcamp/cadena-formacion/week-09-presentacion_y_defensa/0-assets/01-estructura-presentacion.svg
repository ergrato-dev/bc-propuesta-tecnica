<text x="237" y="94" font-family="Inter, Roboto, sans-serif" font-size="9" font-weight="700" fill="#fde68a" text-anchor="middle">Problema y Solucion</text>
<text x="237" y="109" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">4 min</text>
