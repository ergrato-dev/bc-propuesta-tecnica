<text x="385" y="94" font-family="Inter, Roboto, sans-serif" font-size="10" font-weight="700" fill="#93c5fd" text-anchor="middle">Como lo Haremos</text>
<text x="385" y="109" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">4 min</text>
