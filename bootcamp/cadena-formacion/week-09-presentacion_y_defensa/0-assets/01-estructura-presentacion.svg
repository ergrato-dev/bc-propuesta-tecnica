<text x="237" y="241" font-family="Inter, Roboto, sans-serif" font-size="8" fill="#8b949e" text-anchor="middle">Mostrar solucion</text>
<text x="237" y="254" font-family="Inter, Roboto, sans-serif" font-size="8" fill="#8b949e" text-anchor="middle">especifica para el</text>
<text x="237" y="267" font-family="Inter, Roboto, sans-serif" font-size="8" fill="#8b949e" text-anchor="middle">cliente</text>
<text x="237" y="303" font-family="Inter, Roboto, sans-serif" font-size="8" fill="#e6953a" text-anchor="middle">3 slides</text>
