<text x="696" y="94" font-family="Inter, Roboto, sans-serif" font-size="10" font-weight="700" fill="#fed7aa" text-anchor="middle">Cierre</text>
<text x="696" y="109" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">2 min</text>
<line x1="627" y1="118" x2="765" y2="118" stroke="#3d1800" stroke-width="1"/>
<rect x="622" y="126" width="148" height="22" rx="4" fill="#1a0800"/>
<text x="696" y="141" font-family="Inter, Roboto, sans-serif" font-size="8" fill="#fed7aa" text-anchor="middle">Slide 11: Por que elegirnos</text>
<rect x="622" y="152" width="148" height="22" rx="4" fill="#1a0800"/>
<text x="696" y="167" font-family="Inter, Roboto, sans-serif" font-size="8" fill="#fed7aa" text-anchor="middle">Slide 12: Proximos pasos</text>
<text x="696" y="228" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#e6953a" text-anchor="middle">Objetivo:</text>
<text x="696" y="241" font-family="Inter, Roboto, sans-serif" font-size="8" fill="#8b949e" text-anchor="middle">Dejar impresion fuerte</text>
<text x="696" y="254" font-family="Inter, Roboto, sans-serif" font-size="8" fill="#8b949e" text-anchor="middle">Facilitar la decision</text>
<text x="696" y="267" font-family="Inter, Roboto, sans-serif" font-size="8" fill="#8b949e" text-anchor="middle">del cliente</text>
<text x="696" y="303" font-family="Inter, Roboto, sans-serif" font-size="8" fill="#e6953a" text-anchor="middle">2 slides</text>
<rect x="20" y="360" width="760" height="28" rx="5" fill="#161b22" stroke="#30363d" stroke-width="1"/>
<text x="400" y="378" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#e6edf3" text-anchor="middle">Total recomendado: 12 diapositivas - 15 a 17 minutos de presentacion + 10 minutos de preguntas</text>
<text x="400" y="396" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">Cadena de Formacion - Tecnologo ADSO - Semana 9 de 9</text>
