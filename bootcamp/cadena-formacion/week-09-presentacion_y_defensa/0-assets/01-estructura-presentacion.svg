<text x="89" y="94" font-family="Inter, Roboto, sans-serif" font-size="10" font-weight="700" fill="#86efac" text-anchor="middle">Apertura</text>
<text x="89" y="109" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">2 min</text>
<line x1="35" y1="118" x2="143" y2="118" stroke="#1e4a2a" stroke-width="1"/>
<rect x="30" y="126" width="118" height="22" rx="4" fill="#0f2210"/>
