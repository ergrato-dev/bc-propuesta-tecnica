<text x="385" y="228" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#60a5fa" text-anchor="middle">Objetivo:</text>
<text x="385" y="241" font-family="Inter, Roboto, sans-serif" font-size="8" fill="#8b949e" text-anchor="middle">Dar confianza de</text>
<text x="385" y="254" font-family="Inter, Roboto, sans-serif" font-size="8" fill="#8b949e" text-anchor="middle">que hay un plan</text>
<text x="385" y="267" font-family="Inter, Roboto, sans-serif" font-size="8" fill="#8b949e" text-anchor="middle">concreto</text>
<text x="385" y="303" font-family="Inter, Roboto, sans-serif" font-size="8" fill="#60a5fa" text-anchor="middle">3 slides</text>
<polygon points="462,204 454,199 454,209" fill="#8b949e"/>
<line x1="454" y1="204" x2="462" y2="204" stroke="#8b949e" stroke-width="1.5"/>
<rect x="464" y="58" width="138" height="292" rx="6" fill="#1c1436" stroke="#7c3aed" stroke-width="1.5"/>
<text x="533" y="78" font-family="Inter, Roboto, sans-serif" font-size="11" font-weight="700" fill="#7c3aed" text-anchor="middle">ZONA 4</text>
<text x="533" y="94" font-family="Inter, Roboto, sans-serif" font-size="10" font-weight="700" fill="#c4b5fd" text-anchor="middle">La Inversion</text>
<text x="533" y="109" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">4 min</text>
<line x1="479" y1="118" x2="587" y2="118" stroke="#2a1a50" stroke-width="1"/>
<rect x="474" y="126" width="118" height="22" rx="4" fill="#150f28"/>
