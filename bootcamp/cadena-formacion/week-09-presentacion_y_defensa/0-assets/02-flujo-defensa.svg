<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" width="800" height="380">
  <rect width="800" height="380" fill="#0d1117"/>
  <text x="400" y="24" font-family="Inter, Roboto, sans-serif" font-size="15" font-weight="700" fill="#e6edf3" text-anchor="middle">Flujo del Taller de Defensa</text>
  <text x="400" y="40" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">4 etapas - 2 horas 30 minutos en total</text>
  <line x1="60" y1="47" x2="740" y2="47" stroke="#1565C0" stroke-width="1.5" opacity="0.5"/>
  <!-- ETAPA 1: PREPARACION -->
  <rect x="20" y="60" width="170" height="260" rx="6" fill="#0c2d1c" stroke="#56d364" stroke-width="1.5"/>
  <rect x="60" y="68" width="90" height="18" rx="9" fill="#56d364"/>
  <text x="105" y="80" font-family="Inter, Roboto, sans-serif" font-size="9" font-weight="700" fill="#0d1117" text-anchor="middle">30 minutos</text>
  <text x="105" y="105" font-family="Inter, Roboto, sans-serif" font-size="14" font-weight="700" fill="#56d364" text-anchor="middle">Etapa 1</text>
  <text x="105" y="121" font-family="Inter, Roboto, sans-serif" font-size="11" font-weight="700" fill="#86efac" text-anchor="middle">Preparacion</text>
  <line x1="35" y1="133" x2="175" y2="133" stroke="#1e4a2a" stroke-width="1"/>
  <circle cx="42" cy="152" r="4" fill="#56d364"/>
  <text x="52" y="156" font-family="Inter, Roboto, sans-serif" font-size="8" fill="#e6edf3">Memorizar datos clave</text>
  <circle cx="42" cy="174" r="4" fill="#56d364"/>
  <text x="52" y="178" font-family="Inter, Roboto, sans-serif" font-size="8" fill="#e6edf3">Completar plan de presentacion</text>
  <circle cx="42" cy="196" r="4" fill="#56d364"/>
  <text x="52" y="200" font-family="Inter, Roboto, sans-serif" font-size="8" fill="#e6edf3">Ensayar apertura en voz alta</text>
  <circle cx="42" cy="218" r="4" fill="#56d364"/>
  <text x="52" y="222" font-family="Inter, Roboto, sans-serif" font-size="8" fill="#e6edf3">Revisar respuestas preparadas</text>
  <rect x="40" y="280" width="130" height="20" rx="4" fill="#1e4a2a"/>
  <text x="105" y="293" font-family="Inter, Roboto, sans-serif" font-size="8" fill="#56d364" text-anchor="middle">Trabajo individual</text>
  <!-- ARROW 1-2 -->
  <polygon points="204,190 196,185 196,195" fill="#e6edf3"/>
  <line x1="196" y1="190" x2="204" y2="190" stroke="#e6edf3" stroke-width="1.5"/>
  <!-- ETAPA 2: SIMULACRO -->
  <rect x="206" y="60" width="170" height="260" rx="6" fill="#1a1505" stroke="#e6953a" stroke-width="1.5"/>
  <rect x="246" y="68" width="90" height="18" rx="9" fill="#e6953a"/>
  <text x="291" y="80" font-family="Inter, Roboto, sans-serif" font-size="9" font-weight="700" fill="#0d1117" text-anchor="middle">60 minutos</text>
  <text x="291" y="105" font-family="Inter, Roboto, sans-serif" font-size="14" font-weight="700" fill="#e6953a" text-anchor="middle">Etapa 2</text>
  <text x="291" y="121" font-family="Inter, Roboto, sans-serif" font-size="11" font-weight="700" fill="#fde68a" text-anchor="middle">Simulacro</text>
  <line x1="221" y1="133" x2="361" y2="133" stroke="#3d2800" stroke-width="1"/>
  <circle cx="228" cy="152" r="4" fill="#e6953a"/>
  <text x="238" y="156" font-family="Inter, Roboto, sans-serif" font-size="8" fill="#e6edf3">Presentar 15 min ante comite</text>
  <circle cx="228" cy="174" r="4" fill="#e6953a"/>
  <text x="238" y="178" font-family="Inter, Roboto, sans-serif" font-size="8" fill="#e6edf3">10 min preguntas del evaluador</text>
  <circle cx="228" cy="196" r="4" fill="#e6953a"/>
  <text x="238" y="200" font-family="Inter, Roboto, sans-serif" font-size="8" fill="#e6edf3">Observador toma notas</text>
  <circle cx="228" cy="218" r="4" fill="#e6953a"/>
  <text x="238" y="222" font-family="Inter, Roboto, sans-serif" font-size="8" fill="#e6edf3">Rotacion de roles</text>
  <rect x="226" y="280" width="130" height="20" rx="4" fill="#3d2800"/>
  <text x="291" y="293" font-family="Inter, Roboto, sans-serif" font-size="8" fill="#e6953a" text-anchor="middle">En grupos de 3</text>
  <!-- ARROW 2-3 -->
  <polygon points="390,190 382,185 382,195" fill="#e6edf3"/>
  <line x1="382" y1="190" x2="390" y2="190" stroke="#e6edf3" stroke-width="1.5"/>
  <!-- ETAPA 3: PEER REVIEW -->
  <rect x="392" y="60" width="170" height="260" rx="6" fill="#0f1f2e" stroke="#1565C0" stroke-width="1.5"/>
  <rect x="432" y="68" width="90" height="18" rx="9" fill="#1565C0"/>
  <text x="477" y="80" font-family="Inter, Roboto, sans-serif" font-size="9" font-weight="700" fill="#ffffff" text-anchor="middle">30 minutos</text>
  <text x="477" y="105" font-family="Inter, Roboto, sans-serif" font-size="14" font-weight="700" fill="#60a5fa" text-anchor="middle">Etapa 3</text>
  <text x="477" y="121" font-family="Inter, Roboto, sans-serif" font-size="11" font-weight="700" fill="#93c5fd" text-anchor="middle">Peer Review</text>
  <line x1="407" y1="133" x2="547" y2="133" stroke="#0f2040" stroke-width="1"/>
  <circle cx="414" cy="152" r="4" fill="#1565C0"/>
  <text x="424" y="156" font-family="Inter, Roboto, sans-serif" font-size="8" fill="#e6edf3">Intercambiar propuesta</text>
  <circle cx="414" cy="174" r="4" fill="#1565C0"/>
  <text x="424" y="178" font-family="Inter, Roboto, sans-serif" font-size="8" fill="#e6edf3">Completar formulario revision</text>
  <circle cx="414" cy="196" r="4" fill="#1565C0"/>
  <text x="424" y="200" font-family="Inter, Roboto, sans-serif" font-size="8" fill="#e6edf3">Verificar coherencia numerica</text>
  <circle cx="414" cy="218" r="4" fill="#1565C0"/>
  <text x="424" y="222" font-family="Inter, Roboto, sans-serif" font-size="8" fill="#e6edf3">Identificar 3 mejoras</text>
  <rect x="412" y="280" width="130" height="20" rx="4" fill="#0f2040"/>
  <text x="477" y="293" font-family="Inter, Roboto, sans-serif" font-size="8" fill="#60a5fa" text-anchor="middle">En pares</text>
  <!-- ARROW 3-4 -->
  <polygon points="576,190 568,185 568,195" fill="#e6edf3"/>
  <line x1="568" y1="190" x2="576" y2="190" stroke="#e6edf3" stroke-width="1.5"/>
  <!-- ETAPA 4: REFLEXION -->
  <rect x="578" y="60" width="202" height="260" rx="6" fill="#1c1436" stroke="#7c3aed" stroke-width="1.5"/>
  <rect x="634" y="68" width="90" height="18" rx="9" fill="#7c3aed"/>
  <text x="679" y="80" font-family="Inter, Roboto, sans-serif" font-size="9" font-weight="700" fill="#ffffff" text-anchor="middle">30 minutos</text>
  <text x="679" y="105" font-family="Inter, Roboto, sans-serif" font-size="14" font-weight="700" fill="#a78bfa" text-anchor="middle">Etapa 4</text>
  <text x="679" y="121" font-family="Inter, Roboto, sans-serif" font-size="11" font-weight="700" fill="#c4b5fd" text-anchor="middle">Reflexion Grupal</text>
  <line x1="593" y1="133" x2="765" y2="133" stroke="#2a1a50" stroke-width="1"/>
  <circle cx="600" cy="152" r="4" fill="#7c3aed"/>
  <text x="610" y="156" font-family="Inter, Roboto, sans-serif" font-size="8" fill="#e6edf3">Compartir acierto y mejora</text>
  <circle cx="600" cy="174" r="4" fill="#7c3aed"/>
  <text x="610" y="178" font-family="Inter, Roboto, sans-serif" font-size="8" fill="#e6edf3">Debate guiado (4 preguntas)</text>
  <circle cx="600" cy="196" r="4" fill="#7c3aed"/>
  <text x="610" y="200" font-family="Inter, Roboto, sans-serif" font-size="8" fill="#e6edf3">Registrar lecciones aprendidas</text>
  <circle cx="600" cy="218" r="4" fill="#7c3aed"/>
  <text x="610" y="222" font-family="Inter, Roboto, sans-serif" font-size="8" fill="#e6edf3">Ajustes finales propuesta real</text>
  <rect x="598" y="280" width="162" height="20" rx="4" fill="#2a1a50"/>
  <text x="679" y="293" font-family="Inter, Roboto, sans-serif" font-size="8" fill="#a78bfa" text-anchor="middle">Plenaria grupal</text>
  <!-- BARRA TOTAL -->
  <rect x="20" y="332" width="760" height="28" rx="5" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="110" y="349" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#56d364" text-anchor="middle">30 min - Preparacion</text>
  <text x="291" y="349" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#e6953a" text-anchor="middle">60 min - Simulacro</text>
  <text x="477" y="349" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#60a5fa" text-anchor="middle">30 min - Peer Review</text>
  <text x="640" y="349" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#a78bfa" text-anchor="middle">30 min - Reflexion</text>
  <rect x="706" y="335" width="66" height="20" rx="4" fill="#1565C0"/>
  <text x="739" y="348" font-family="Inter, Roboto, sans-serif" font-size="9" font-weight="700" fill="#ffffff" text-anchor="middle">Total 2h30m</text>
  <text x="400" y="375" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">Cadena de Formacion - Tecnologo ADSO - Semana 9 de 9</text>
</svg>