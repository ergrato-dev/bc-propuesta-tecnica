  <text x="400" y="196" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">Clientes</text>

  <!-- Module 4 -->
  <line x1="570" y1="145" x2="570" y2="165" stroke="#404850" stroke-width="1.5"/>
