  <line x1="210" y1="335" x2="235" y2="335" stroke="#404850" stroke-width="1"/>
  <rect x="235" y="320" width="90" height="30" rx="4" fill="#111b27" stroke="#404850" stroke-width="1"/>
  <text x="280" y="339" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#c9d1d9" text-anchor="middle">2.3 Stock y alertas</text>

