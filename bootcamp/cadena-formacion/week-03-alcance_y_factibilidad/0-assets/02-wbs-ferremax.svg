  <line x1="570" y1="295" x2="595" y2="295" stroke="#404850" stroke-width="1"/>
  <rect x="595" y="280" width="90" height="30" rx="4" fill="#111b27" stroke="#404850" stroke-width="1"/>
  <text x="640" y="299" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#c9d1d9" text-anchor="middle">4.2 Cálculo total</text>
  <line x1="570" y1="335" x2="595" y2="335" stroke="#404850" stroke-width="1"/>
  <rect x="595" y="320" width="90" height="30" rx="4" fill="#111b27" stroke="#404850" stroke-width="1"/>
  <text x="640" y="339" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#c9d1d9" text-anchor="middle">4.3 Descuenta stock</text>

  <!-- Level 2 — Module 5 children -->
  <line x1="725" y1="205" x2="725" y2="230" stroke="#404850" stroke-width="1"/>
  <line x1="725" y1="230" x2="725" y2="360" stroke="#404850" stroke-width="1"/>
  <line x1="725" y1="255" x2="700" y2="255" stroke="#404850" stroke-width="1"/>
  <rect x="620" y="240" width="80" height="30" rx="4" fill="#111b27" stroke="#404850" stroke-width="1"/>
  <text x="660" y="259" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#c9d1d9" text-anchor="middle">5.1 Rpte ventas</text>
  <line x1="725" y1="300" x2="700" y2="300" stroke="#404850" stroke-width="1"/>
  <rect x="620" y="285" width="80" height="30" rx="4" fill="#111b27" stroke="#404850" stroke-width="1"/>
  <text x="660" y="304" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#c9d1d9" text-anchor="middle">5.2 Rpte inventario</text>

  <!-- Level labels -->
  <text x="16" y="96" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#484f58" transform="rotate(-90, 16, 96)">Nivel 0</text>
  <text x="16" y="188" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#484f58" transform="rotate(-90, 16, 188)">Nivel 1</text>
  <text x="16" y="305" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#484f58" transform="rotate(-90, 16, 305)">Nivel 2</text>

  <!-- Footer -->
  <text x="400" y="530" font-family="Inter, Roboto, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">El WBS descompone los ENTREGABLES del proyecto — no las tareas diarias del equipo.</text>
  <text x="400" y="548" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#484f58" text-anchor="middle">Semana 03 · Cadena de Formación · Tecnólogo ADSO</text>
</svg>
