<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560" width="800" height="560">
  <!-- Background -->
  <rect width="800" height="560" fill="#0d1117"/>

  <!-- Title -->
  <text x="400" y="36" font-family="Inter, Roboto, sans-serif" font-size="19" font-weight="700" fill="#e6edf3" text-anchor="middle">WBS — Sistema de Gestión FerreMax S.A.S.</text>
  <text x="400" y="56" font-family="Inter, Roboto, sans-serif" font-size="12" fill="#8b949e" text-anchor="middle">Estructura de Desglose del Trabajo · 2 niveles</text>

  <!-- Level 0 — Project root -->
  <rect x="250" y="70" width="300" height="44" rx="8" fill="#1565C0"/>
  <text x="400" y="88" font-family="Inter, Roboto, sans-serif" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">Sistema de Gestión</text>
  <text x="400" y="105" font-family="Inter, Roboto, sans-serif" font-size="11" fill="#90caf9" text-anchor="middle">FerreMax S.A.S.</text>

  <!-- Vertical line from root -->
  <line x1="400" y1="114" x2="400" y2="145" stroke="#404850" stroke-width="1.5"/>
  <!-- Horizontal line - level 1 connector -->
  <line x1="75" y1="145" x2="725" y2="145" stroke="#404850" stroke-width="1.5"/>

  <!-- Level 1 — 5 modules -->
  <!-- Module 1 -->
  <line x1="75" y1="145" x2="75" y2="165" stroke="#404850" stroke-width="1.5"/>
  <rect x="20" y="165" width="110" height="40" rx="6" fill="#0d2137" stroke="#1565C0" stroke-width="1.5"/>
  <text x="75" y="181" font-family="Inter, Roboto, sans-serif" font-size="10" font-weight="600" fill="#90caf9" text-anchor="middle">1. Autenticación</text>
  <text x="75" y="196" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">y Usuarios</text>

  <!-- Module 2 -->
  <line x1="210" y1="145" x2="210" y2="165" stroke="#404850" stroke-width="1.5"/>
  <rect x="155" y="165" width="110" height="40" rx="6" fill="#0d2137" stroke="#1565C0" stroke-width="1.5"/>
  <text x="210" y="181" font-family="Inter, Roboto, sans-serif" font-size="10" font-weight="600" fill="#90caf9" text-anchor="middle">2. Gestión de</text>
  <text x="210" y="196" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">Inventario</text>

  <!-- Module 3 -->
  <line x1="400" y1="145" x2="400" y2="165" stroke="#404850" stroke-width="1.5"/>
