  <line x1="400" y1="205" x2="400" y2="230" stroke="#404850" stroke-width="1"/>
  <line x1="400" y1="230" x2="400" y2="360" stroke="#404850" stroke-width="1"/>
  <line x1="400" y1="255" x2="425" y2="255" stroke="#404850" stroke-width="1"/>
  <rect x="425" y="240" width="90" height="30" rx="4" fill="#111b27" stroke="#404850" stroke-width="1"/>
