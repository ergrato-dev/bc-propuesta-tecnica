<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" width="800" height="520">
  <!-- Background -->
  <rect width="800" height="520" fill="#0d1117"/>

  <!-- Title -->
  <text x="400" y="28" font-family="Inter, Roboto, sans-serif" font-size="15" font-weight="700" fill="#e6edf3" text-anchor="middle">Anatomía del Resumen Ejecutivo</text>
  <text x="400" y="46" font-family="Inter, Roboto, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">4 párrafos · 200–350 palabras · Para el directivo · Sin tecnicismos · Se escribe de ÚLTIMO</text>
  <line x1="60" y1="54" x2="740" y2="54" stroke="#1565C0" stroke-width="1.5" opacity="0.5"/>

  <!-- COLUMN HEADERS -->
  <text x="55" y="72" font-family="Inter, Roboto, sans-serif" font-size="10" font-weight="700" fill="#8b949e">PÁRRAFO</text>
  <text x="165" y="72" font-family="Inter, Roboto, sans-serif" font-size="10" font-weight="700" fill="#8b949e">PROPÓSITO</text>
  <text x="355" y="72" font-family="Inter, Roboto, sans-serif" font-size="10" font-weight="700" fill="#8b949e">¿QUÉ INCLUIR?</text>
  <text x="570" y="72" font-family="Inter, Roboto, sans-serif" font-size="10" font-weight="700" fill="#8b949e">EJEMPLO · FERREMAX</text>
  <line x1="40" y1="78" x2="760" y2="78" stroke="#21262d" stroke-width="1"/>

  <!-- ============================================== -->
  <!-- P1 — El Problema -->
  <!-- ============================================== -->
  <!-- Paragraph label -->
  <rect x="40" y="84" width="110" height="84" rx="6" fill="#1a1505" stroke="#e6953a" stroke-width="1.5"/>
  <text x="95" y="110" font-family="Inter, Roboto, sans-serif" font-size="28" font-weight="800" fill="#e6953a" text-anchor="middle" opacity="0.25">P1</text>
  <text x="95" y="128" font-family="Inter, Roboto, sans-serif" font-size="11" font-weight="700" fill="#fde68a" text-anchor="middle">El Problema</text>
  <text x="95" y="145" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#e6953a" text-anchor="middle">~2–3 oraciones</text>
  <text x="95" y="160" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#e6953a" text-anchor="middle">Hechos concretos</text>

  <!-- Purpose -->
  <rect x="160" y="84" width="180" height="84" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="170" y="101" font-family="Inter, Roboto, sans-serif" font-size="10" font-weight="700" fill="#e6edf3">Contextualizar</text>
  <text x="170" y="115" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#8b949e">Describir la situación actual</text>
  <text x="170" y="128" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#8b949e">del cliente sin tecnicismos.</text>
  <text x="170" y="145" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#60a5fa">Responde: ¿qué problema</text>
  <text x="170" y="158" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#60a5fa">tiene el cliente hoy?</text>

  <!-- What to include -->
  <rect x="350" y="84" width="200" height="84" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="360" y="101" font-family="Inter, Roboto, sans-serif" font-size="10" font-weight="700" fill="#e6edf3">✓ Nombre y actividad del cliente</text>
  <text x="360" y="116" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#8b949e">✓ Descripción del problema central</text>
  <text x="360" y="130" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#8b949e">✓ Impacto del problema (negocio)</text>
  <text x="360" y="144" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#8b949e">✓ Datos cuantitativos si existen</text>
  <text x="360" y="158" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#8b949e">✗ No incluir solución todavía</text>

  <!-- Example FerreMax -->
  <rect x="560" y="84" width="200" height="84" rx="6" fill="#1c1436" stroke="#7c3aed" stroke-width="1"/>
  <text x="570" y="101" font-family="Inter, Roboto, sans-serif" font-size="10" font-weight="700" fill="#a78bfa">FerreMax — Cali, 12 años</text>
  <text x="570" y="116" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#c4b5fd">"FerreMax S.A.S. administra</text>
  <text x="570" y="129" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#c4b5fd">3 sucursales con hojas de cálculo</text>
  <text x="570" y="142" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#c4b5fd">independientes. Esto genera</text>
  <text x="570" y="155" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#c4b5fd">pérdidas por ~$4.2M/mes en</text>
  <text x="570" y="168" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#c4b5fd">diferencias de inventario."</text>

  <!-- Separator -->
  <line x1="40" y1="176" x2="760" y2="176" stroke="#21262d" stroke-width="1" stroke-dasharray="2,3"/>

  <!-- ============================================== -->
  <!-- P2 — La Solución -->
  <!-- ============================================== -->
  <rect x="40" y="182" width="110" height="84" rx="6" fill="#0c2d1c" stroke="#56d364" stroke-width="1.5"/>
  <text x="95" y="208" font-family="Inter, Roboto, sans-serif" font-size="28" font-weight="800" fill="#56d364" text-anchor="middle" opacity="0.25">P2</text>
  <text x="95" y="226" font-family="Inter, Roboto, sans-serif" font-size="11" font-weight="700" fill="#86efac" text-anchor="middle">La Solución</text>
  <text x="95" y="243" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#56d364" text-anchor="middle">~2–3 oraciones</text>
  <text x="95" y="258" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#56d364" text-anchor="middle">Nombre + módulos</text>

  <rect x="160" y="182" width="180" height="84" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="170" y="199" font-family="Inter, Roboto, sans-serif" font-size="10" font-weight="700" fill="#e6edf3">Presentar la solución</text>
  <text x="170" y="213" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#8b949e">Describir qué se va a construir.</text>
  <text x="170" y="226" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#8b949e">Usar lenguaje de negocio,</text>
  <text x="170" y="239" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#8b949e">no jerga técnica.</text>
  <text x="170" y="255" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#60a5fa">Responde: ¿qué le vamos</text>
  <text x="170" y="263" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#60a5fa">a entregar?</text>

  <rect x="350" y="182" width="200" height="84" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="360" y="199" font-family="Inter, Roboto, sans-serif" font-size="10" font-weight="700" fill="#e6edf3">✓ Nombre del sistema/producto</text>
  <text x="360" y="214" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#8b949e">✓ Listado de módulos (funciones)</text>
  <text x="360" y="228" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#8b949e">✓ Tecnología en términos generales</text>
  <text x="360" y="242" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#8b949e">✗ No listar todos los req. técnicos</text>
  <text x="360" y="256" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#8b949e">✗ No mencionar versiones exactas</text>

  <rect x="560" y="182" width="200" height="84" rx="6" fill="#1c1436" stroke="#7c3aed" stroke-width="1"/>
  <text x="570" y="199" font-family="Inter, Roboto, sans-serif" font-size="10" font-weight="700" fill="#a78bfa">FerreMax GI</text>
  <text x="570" y="214" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#c4b5fd">"Proponemos desarrollar FerreMax</text>
  <text x="570" y="227" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#c4b5fd">GI, un sistema web con 6 módulos:</text>
  <text x="570" y="240" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#c4b5fd">autenticación, inventario, clientes,</text>
  <text x="570" y="253" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#c4b5fd">ventas, reportes y configuración."</text>

  <!-- Separator -->
  <line x1="40" y1="274" x2="760" y2="274" stroke="#21262d" stroke-width="1" stroke-dasharray="2,3"/>

  <!-- ============================================== -->
  <!-- P3 — Cómo se Ejecuta -->
  <!-- ============================================== -->
  <rect x="40" y="280" width="110" height="84" rx="6" fill="#0f1f2e" stroke="#1565C0" stroke-width="1.5"/>
  <text x="95" y="306" font-family="Inter, Roboto, sans-serif" font-size="28" font-weight="800" fill="#1565C0" text-anchor="middle" opacity="0.5">P3</text>
  <text x="95" y="325" font-family="Inter, Roboto, sans-serif" font-size="11" font-weight="700" fill="#93c5fd" text-anchor="middle">La Ejecución</text>
  <text x="95" y="342" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#60a5fa" text-anchor="middle">~2 oraciones</text>
  <text x="95" y="357" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#60a5fa" text-anchor="middle">Metodología + duración</text>

  <rect x="160" y="280" width="180" height="84" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="170" y="297" font-family="Inter, Roboto, sans-serif" font-size="10" font-weight="700" fill="#e6edf3">Dar confianza</text>
  <text x="170" y="311" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#8b949e">Mostrar que hay un plan claro.</text>
  <text x="170" y="324" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#8b949e">El directivo quiere saber</text>
  <text x="170" y="337" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#8b949e">si somos capaces de entregar.</text>
  <text x="170" y="353" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#60a5fa">Responde: ¿cómo lo haremos</text>
  <text x="170" y="361" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#60a5fa">y en cuánto tiempo?</text>

  <rect x="350" y="280" width="200" height="84" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="360" y="297" font-family="Inter, Roboto, sans-serif" font-size="10" font-weight="700" fill="#e6edf3">✓ Nombre de la metodología</text>
  <text x="360" y="312" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#8b949e">✓ Duración total del proyecto</text>
  <text x="360" y="326" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#8b949e">✓ Número de fases o sprints</text>
  <text x="360" y="340" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#8b949e">✓ Composición del equipo</text>
  <text x="360" y="354" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#8b949e">✗ No listar todas las tareas</text>

  <rect x="560" y="280" width="200" height="84" rx="6" fill="#1c1436" stroke="#7c3aed" stroke-width="1"/>
  <text x="570" y="297" font-family="Inter, Roboto, sans-serif" font-size="10" font-weight="700" fill="#a78bfa">15 semanas · Dev A + Dev B</text>
  <text x="570" y="312" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#c4b5fd">"El proyecto se ejecutará en</text>
  <text x="570" y="325" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#c4b5fd">15 semanas mediante metodología</text>
  <text x="570" y="338" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#c4b5fd">iterativa, con 2 desarrolladores</text>
  <text x="570" y="351" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#c4b5fd">y entregables semanales."</text>

  <!-- Separator -->
  <line x1="40" y1="372" x2="760" y2="372" stroke="#21262d" stroke-width="1" stroke-dasharray="2,3"/>

  <!-- ============================================== -->
  <!-- P4 — El Precio -->
  <!-- ============================================== -->
  <rect x="40" y="378" width="110" height="84" rx="6" fill="#0c2d1c" stroke="#56d364" stroke-width="1.5"/>
  <text x="95" y="404" font-family="Inter, Roboto, sans-serif" font-size="28" font-weight="800" fill="#56d364" text-anchor="middle" opacity="0.25">P4</text>
  <text x="95" y="422" font-family="Inter, Roboto, sans-serif" font-size="11" font-weight="700" fill="#86efac" text-anchor="middle">El Precio</text>
  <text x="95" y="439" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#56d364" text-anchor="middle">~2 oraciones</text>
  <text x="95" y="454" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#56d364" text-anchor="middle">Total COP + condiciones</text>

  <rect x="160" y="378" width="180" height="84" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="170" y="395" font-family="Inter, Roboto, sans-serif" font-size="10" font-weight="700" fill="#e6edf3">Hacer el llamado a la acción</text>
  <text x="170" y="409" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#8b949e">El directivo necesita saber</text>
  <text x="170" y="422" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#8b949e">el precio antes de leer todo.</text>
  <text x="170" y="435" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#8b949e">Debe cerrar con confianza.</text>
  <text x="170" y="451" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#60a5fa">Responde: ¿cuánto cuesta</text>
  <text x="170" y="459" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#60a5fa">y en qué condiciones?</text>

  <rect x="350" y="378" width="200" height="84" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="360" y="395" font-family="Inter, Roboto, sans-serif" font-size="10" font-weight="700" fill="#e6edf3">✓ Inversión total en COP</text>
  <text x="360" y="410" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#8b949e">✓ Condiciones de pago (30/40/30)</text>
  <text x="360" y="424" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#8b949e">✓ Validez de la propuesta</text>
  <text x="360" y="438" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#8b949e">✓ Brevísima invitación a seguir</text>
  <text x="360" y="452" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#8b949e">✗ No desglosar tarifas internas</text>

  <rect x="560" y="378" width="200" height="84" rx="6" fill="#1c1436" stroke="#7c3aed" stroke-width="1"/>
  <text x="570" y="395" font-family="Inter, Roboto, sans-serif" font-size="10" font-weight="700" fill="#a78bfa">$99,165,000 COP · 30/40/30</text>
  <text x="570" y="410" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#c4b5fd">"La inversión total es de</text>
  <text x="570" y="423" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#c4b5fd">$99,165,000 COP, pagadera en</text>
  <text x="570" y="436" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#c4b5fd">3 cuotas. La oferta es válida</text>
  <text x="570" y="449" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#c4b5fd">por 30 días calendario."</text>

  <!-- Footer tip -->
  <line x1="40" y1="471" x2="760" y2="471" stroke="#1565C0" stroke-width="1" opacity="0.3"/>
  <text x="400" y="491" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">💡 Todos los párrafos en lenguaje de negocio · Sin acrónimos no explicados · Sin lenguaje coloquial · El directivo NO es técnico</text>
  <text x="400" y="508" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">Cadena de Formación · Tecnólogo ADSO · Semana 7 de 9</text>
</svg>
