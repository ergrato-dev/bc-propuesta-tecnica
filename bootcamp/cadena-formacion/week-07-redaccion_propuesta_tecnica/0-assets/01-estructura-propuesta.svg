<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" width="800" height="520">
  <!-- Background -->
  <rect width="800" height="520" fill="#0d1117"/>

  <!-- Title -->
  <text x="400" y="32" font-family="Inter, Roboto, sans-serif" font-size="16" font-weight="700" fill="#e6edf3" text-anchor="middle">Estructura de la Propuesta Técnica — 10 Secciones</text>
  <line x1="60" y1="42" x2="740" y2="42" stroke="#1565C0" stroke-width="1.5" opacity="0.5"/>

  <!-- Document container -->
  <rect x="60" y="52" width="220" height="452" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>

  <!-- Document "tab" label -->
  <rect x="60" y="52" width="220" height="28" rx="8" fill="#1565C0"/>
  <rect x="60" y="68" width="220" height="12" fill="#1565C0"/>
  <text x="170" y="70" font-family="Inter, Roboto, sans-serif" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">PROPUESTA TÉCNICA</text>

  <!-- Section list in document -->
  <!-- 1 Portada -->
  <rect x="72" y="88" width="196" height="34" rx="5" fill="#0d2a47" stroke="#1565C0" stroke-width="1"/>
  <text x="84" y="102" font-family="Inter, Roboto, sans-serif" font-size="10" font-weight="700" fill="#60a5fa">1</text>
  <text x="98" y="102" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#e6edf3">Portada e Información</text>
  <text x="98" y="114" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#8b949e">Versión · Fecha · Cliente/Proveedor</text>

  <!-- 2 Resumen ejecutivo -->
  <rect x="72" y="128" width="196" height="34" rx="5" fill="#1a1505" stroke="#e6953a" stroke-width="1.5"/>
  <text x="84" y="142" font-family="Inter, Roboto, sans-serif" font-size="10" font-weight="700" fill="#fb923c">2</text>
  <text x="98" y="142" font-family="Inter, Roboto, sans-serif" font-size="10" font-weight="700" fill="#fde68a">Resumen Ejecutivo</text>
  <text x="98" y="154" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#e6953a">⭐ Lo más importante — 1 página</text>

  <!-- 3 Antecedentes -->
  <rect x="72" y="168" width="196" height="34" rx="5" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="84" y="183" font-family="Inter, Roboto, sans-serif" font-size="10" font-weight="700" fill="#60a5fa">3</text>
  <text x="98" y="183" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#e6edf3">Análisis del Problema</text>
  <text x="98" y="195" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#8b949e">Situación actual · Diagnóstico</text>

  <!-- 4 Solución -->
  <rect x="72" y="208" width="196" height="34" rx="5" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="84" y="223" font-family="Inter, Roboto, sans-serif" font-size="10" font-weight="700" fill="#60a5fa">4</text>
  <text x="98" y="223" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#e6edf3">Propuesta de Solución</text>
  <text x="98" y="235" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#8b949e">Módulos · Stack · Arquitectura</text>

  <!-- 5 Alcance -->
  <rect x="72" y="248" width="196" height="34" rx="5" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="84" y="263" font-family="Inter, Roboto, sans-serif" font-size="10" font-weight="700" fill="#60a5fa">5</text>
  <text x="98" y="263" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#e6edf3">Alcance del Proyecto</text>
  <text x="98" y="275" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#8b949e">Qué SÍ entra · Qué NO entra</text>

  <!-- 6 Metodología -->
  <rect x="72" y="288" width="196" height="34" rx="5" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="84" y="303" font-family="Inter, Roboto, sans-serif" font-size="10" font-weight="700" fill="#60a5fa">6</text>
  <text x="98" y="303" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#e6edf3">Metodología</text>
  <text x="98" y="315" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#8b949e">Fases · Herramientas · QA</text>

  <!-- 7 Cronograma -->
  <rect x="72" y="328" width="196" height="34" rx="5" fill="#0c2d1c" stroke="#56d364" stroke-width="1"/>
  <text x="84" y="343" font-family="Inter, Roboto, sans-serif" font-size="10" font-weight="700" fill="#56d364">7</text>
  <text x="98" y="343" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#e6edf3">Cronograma</text>
  <text x="98" y="355" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#56d364">← de S05</text>

  <!-- 8 Costos -->
  <rect x="72" y="368" width="196" height="34" rx="5" fill="#0c2d1c" stroke="#56d364" stroke-width="1"/>
  <text x="84" y="383" font-family="Inter, Roboto, sans-serif" font-size="10" font-weight="700" fill="#56d364">8</text>
  <text x="98" y="383" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#e6edf3">Estimación de Costos</text>
  <text x="98" y="395" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#56d364">← de S06</text>

  <!-- 9 Equipo -->
  <rect x="72" y="408" width="196" height="34" rx="5" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="84" y="423" font-family="Inter, Roboto, sans-serif" font-size="10" font-weight="700" fill="#60a5fa">9</text>
  <text x="98" y="423" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#e6edf3">Equipo del Proyecto</text>
  <text x="98" y="435" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#8b949e">Perfiles · Roles · Dedicación</text>

  <!-- 10 Supuestos -->
  <rect x="72" y="448" width="196" height="44" rx="5" fill="#1c1436" stroke="#7c3aed" stroke-width="1"/>
  <text x="84" y="463" font-family="Inter, Roboto, sans-serif" font-size="10" font-weight="700" fill="#a78bfa">10</text>
  <text x="100" y="463" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#e6edf3">Supuestos y Firma</text>
  <text x="100" y="476" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#a78bfa">Condiciones · Firma de aceptación</text>
  <text x="100" y="487" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#8b949e">Convierte la propuesta en acuerdo</text>

  <!-- RIGHT SIDE: reader and purpose annotations -->
  <!-- Title -->
  <text x="330" y="58" font-family="Inter, Roboto, sans-serif" font-size="11" font-weight="700" fill="#8b949e">LECTOR PRINCIPAL</text>
  <text x="550" y="58" font-family="Inter, Roboto, sans-serif" font-size="11" font-weight="700" fill="#8b949e">PROPÓSITO</text>

  <!-- Arrows from sections to readers -->
  <!-- Section 1 -->
  <line x1="268" y1="105" x2="310" y2="105" stroke="#30363d" stroke-width="1"/>
  <text x="315" y="109" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#8b949e">Todos</text>
  <text x="510" y="109" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#8b949e">Identificar y versionar el documento</text>

  <!-- Section 2 — highlight box -->
  <rect x="305" y="126" width="430" height="38" rx="5" fill="#1a1505" stroke="#e6953a" stroke-width="1"/>
  <text x="315" y="141" font-family="Inter, Roboto, sans-serif" font-size="10" font-weight="700" fill="#fde68a">Directivo / dueño del negocio</text>
  <text x="510" y="141" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#e6953a">⭐ Decide si firma → escríbelo de último</text>
  <text x="315" y="157" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#e6953a">Sin tecnicismos · 200–350 palabras</text>

  <!-- Section 3 -->
  <line x1="268" y1="185" x2="310" y2="185" stroke="#30363d" stroke-width="1"/>
  <text x="315" y="189" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#8b949e">Directivo + técnico</text>
  <text x="510" y="189" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#8b949e">Muestra que entiendes el negocio</text>

  <!-- Section 4 -->
  <line x1="268" y1="225" x2="310" y2="225" stroke="#30363d" stroke-width="1"/>
  <text x="315" y="229" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#8b949e">Equipo técnico del cliente</text>
  <text x="510" y="229" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#8b949e">Argumenta idoneidad de la solución</text>

  <!-- Section 5 -->
  <line x1="268" y1="265" x2="310" y2="265" stroke="#30363d" stroke-width="1"/>
  <text x="315" y="269" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#8b949e">Directivo + técnico</text>
  <text x="510" y="269" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#c9d1d9">Protege contra alcance infundado</text>

  <!-- Section 6 -->
  <line x1="268" y1="305" x2="310" y2="305" stroke="#30363d" stroke-width="1"/>
  <text x="315" y="309" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#8b949e">Directivo + técnico</text>
  <text x="510" y="309" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#8b949e">Muestra cómo y cuándo se ejecuta</text>

  <!-- Section 7 — green -->
  <rect x="305" y="326" width="430" height="38" rx="5" fill="#0c2d1c" stroke="#56d364" stroke-width="1"/>
  <text x="315" y="340" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#e6edf3">Directivo</text>
  <text x="510" y="340" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#56d364">Datos de tu entregable S05</text>
  <text x="315" y="356" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#56d364">Tabla de semanas + hitos clave</text>

  <!-- Section 8 — green -->
  <rect x="305" y="366" width="430" height="38" rx="5" fill="#0c2d1c" stroke="#56d364" stroke-width="1"/>
  <text x="315" y="380" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#e6edf3">Directivo</text>
  <text x="510" y="380" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#56d364">Datos de tu entregable S06</text>
  <text x="315" y="396" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#56d364">Tabla ejecutiva de costos · Total en COP</text>

  <!-- Section 9 -->
  <line x1="268" y1="425" x2="310" y2="425" stroke="#30363d" stroke-width="1"/>
  <text x="315" y="429" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#8b949e">Directivo</text>
  <text x="510" y="429" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#8b949e">Genera confianza en el equipo</text>

  <!-- Section 10 -->
  <rect x="305" y="446" width="430" height="48" rx="5" fill="#1c1436" stroke="#7c3aed" stroke-width="1"/>
  <text x="315" y="461" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#e6edf3">Directivo + legal</text>
  <text x="510" y="461" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#a78bfa">Convierte oferta en acuerdo firmado</text>
  <text x="315" y="476" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#a78bfa">Supuestos · Validez · Firma de aceptación</text>
  <text x="315" y="488" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#8b949e">Base para el contrato de desarrollo</text>

  <!-- Bottom note -->
  <line x1="60" y1="505" x2="740" y2="505" stroke="#21262d" stroke-width="1"/>
  <text x="400" y="517" font-family="Inter, Roboto, sans-serif" font-size="9.5" fill="#8b949e" text-anchor="middle">S05 y S06 = secciones 7 y 8 ya construidas  ·  Sec. 2 (resumen ejecutivo) se redacta de último  ·  Cadena de Formación · Semana 7</text>
</svg>
