  <text x="542" y="378" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#facc15" text-anchor="middle">● Inventario + Clientes</text>
  <text x="694" y="396" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#facc15" text-anchor="middle">● Sistema completo</text>
  <text x="818" y="414" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#facc15" text-anchor="middle">● Entrega final</text>

