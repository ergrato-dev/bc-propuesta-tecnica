  <text x="162" y="446" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#c9d1d9">Ruta crítica ⚑</text>
  <rect x="270" y="436" width="18" height="12" rx="2" fill="#1565C0"/>
  <text x="292" y="446" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#c9d1d9">Ruta no crítica</text>
  <polygon points="404,436 412,448 404,460" fill="#facc15"/>
  <text x="418" y="446" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#facc15">Hito (punto de control)</text>
  <text x="90" y="468" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#8b949e">Duración total: 15 semanas ≈ 3.5 meses   |   Esfuerzo: 194 días-persona   |   Equipo: 2 devs @ 80% cap.</text>
