<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 390" width="800" height="390">
  <!-- Background -->
  <rect width="800" height="390" fill="#0d1117"/>

  <!-- Title -->
  <text x="400" y="24" font-family="Inter, Roboto, sans-serif" font-size="15" font-weight="700" fill="#e6edf3" text-anchor="middle">Ciclo de Gestión de Riesgos</text>
  <text x="400" y="40" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">4 etapas para identificar, analizar, planificar y documentar riesgos del proyecto</text>
  <line x1="60" y1="47" x2="740" y2="47" stroke="#1565C0" stroke-width="1.5" opacity="0.5"/>

  <!-- FORWARD ARROWS 1→2→3→4 (at cy=140) -->
  <line x1="179" y1="140" x2="267" y2="140" stroke="#30363d" stroke-width="2"/>
  <polygon points="267,140 259,135 259,145" fill="#8b949e"/>
  <line x1="357" y1="140" x2="445" y2="140" stroke="#30363d" stroke-width="2"/>
  <polygon points="445,140 437,135 437,145" fill="#8b949e"/>
  <line x1="535" y1="140" x2="623" y2="140" stroke="#30363d" stroke-width="2"/>
  <polygon points="623,140 615,135 615,145" fill="#8b949e"/>

  <!-- CIRCLE 1: IDENTIFICAR -->
  <circle cx="135" cy="140" r="44" fill="#0c2d1c" stroke="#56d364" stroke-width="2"/>
  <text x="135" y="134" font-family="Inter, Roboto, sans-serif" font-size="13" font-weight="700" fill="#56d364" text-anchor="middle">1</text>
  <text x="135" y="150" font-family="Inter, Roboto, sans-serif" font-size="10" font-weight="700" fill="#86efac" text-anchor="middle">Identificar</text>

  <!-- CIRCLE 2: ANALIZAR -->
  <circle cx="313" cy="140" r="44" fill="#1a1505" stroke="#e6953a" stroke-width="2"/>
  <text x="313" y="134" font-family="Inter, Roboto, sans-serif" font-size="13" font-weight="700" fill="#e6953a" text-anchor="middle">2</text>
  <text x="313" y="150" font-family="Inter, Roboto, sans-serif" font-size="10" font-weight="700" fill="#fde68a" text-anchor="middle">Analizar</text>

  <!-- CIRCLE 3: PLANIFICAR -->
  <circle cx="491" cy="140" r="44" fill="#1c1436" stroke="#7c3aed" stroke-width="2"/>
  <text x="491" y="130" font-family="Inter, Roboto, sans-serif" font-size="13" font-weight="700" fill="#7c3aed" text-anchor="middle">3</text>
  <text x="491" y="144" font-family="Inter, Roboto, sans-serif" font-size="9" font-weight="700" fill="#c4b5fd" text-anchor="middle">Planificar</text>
  <text x="491" y="157" font-family="Inter, Roboto, sans-serif" font-size="9" font-weight="700" fill="#c4b5fd" text-anchor="middle">Respuesta</text>

  <!-- CIRCLE 4: DOCUMENTAR -->
  <circle cx="669" cy="140" r="44" fill="#0f1f2e" stroke="#1565C0" stroke-width="2"/>
  <text x="669" y="134" font-family="Inter, Roboto, sans-serif" font-size="13" font-weight="700" fill="#1565C0" text-anchor="middle">4</text>
  <text x="669" y="150" font-family="Inter, Roboto, sans-serif" font-size="10" font-weight="700" fill="#93c5fd" text-anchor="middle">Documentar</text>

  <!-- DESC BOX 1: IDENTIFICAR -->
  <rect x="51" y="196" width="168" height="80" rx="5" fill="#161b22" stroke="#56d364" stroke-width="1"/>
  <text x="135" y="212" font-family="Inter, Roboto, sans-serif" font-size="9" font-weight="600" fill="#86efac" text-anchor="middle">¿Qué podría salir mal?</text>
  <text x="135" y="226" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">Listar riesgos posibles</text>
  <text x="135" y="239" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">Técnico · Gestión · Financiero</text>
  <text x="135" y="252" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">Comunicación · Recursos</text>
  <text x="135" y="265" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">Externo</text>

  <!-- DESC BOX 2: ANALIZAR -->
  <rect x="229" y="196" width="168" height="80" rx="5" fill="#161b22" stroke="#e6953a" stroke-width="1"/>
  <text x="313" y="212" font-family="Inter, Roboto, sans-serif" font-size="9" font-weight="600" fill="#fde68a" text-anchor="middle">Calificar cada riesgo</text>
  <text x="313" y="226" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">Probabilidad (P): escala 1–5</text>
  <text x="313" y="239" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">Impacto (I): escala 1–5</text>
  <text x="313" y="252" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#fde68a" text-anchor="middle">Nivel = P × I</text>
  <text x="313" y="265" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">Bajo / Medio / Alto / Crítico</text>

  <!-- DESC BOX 3: PLANIFICAR -->
  <rect x="407" y="196" width="168" height="80" rx="5" fill="#161b22" stroke="#7c3aed" stroke-width="1"/>
  <text x="491" y="212" font-family="Inter, Roboto, sans-serif" font-size="9" font-weight="600" fill="#c4b5fd" text-anchor="middle">Definir estrategia</text>
  <text x="491" y="226" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">Mitigar: reducir P o I</text>
  <text x="491" y="239" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">Evitar: eliminar la causa</text>
  <text x="491" y="252" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">Transferir: ceder a tercero</text>
  <text x="491" y="265" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">Aceptar: bajo impacto</text>

  <!-- DESC BOX 4: DOCUMENTAR -->
  <rect x="585" y="196" width="168" height="80" rx="5" fill="#161b22" stroke="#1565C0" stroke-width="1"/>
  <text x="669" y="212" font-family="Inter, Roboto, sans-serif" font-size="9" font-weight="600" fill="#93c5fd" text-anchor="middle">Registrar en la propuesta</text>
  <text x="669" y="226" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">Tabla §12: ID · Desc</text>
  <text x="669" y="239" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">P · I · Nivel · Estrategia</text>
  <text x="669" y="252" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">Acción concreta</text>
  <text x="669" y="265" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#1565C0" text-anchor="middle">Responsable asignado</text>

  <!-- RETURN ARROW: U-shape below description boxes -->
  <path d="M 669,184 C 735,184 755,312 669,318 L 135,318 C 49,312 65,184 135,184"
        stroke="#30363d" stroke-width="1.5" fill="none" stroke-dasharray="5,4"/>
  <!-- Arrowhead pointing up at circle 1 -->
  <polygon points="135,184 129,196 141,196" fill="#8b949e"/>
  <!-- Label -->
  <text x="402" y="337" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">↺  ciclo continuo — revisar en cada reunión de avance del proyecto</text>

  <!-- Footer -->
  <line x1="60" y1="352" x2="740" y2="352" stroke="#21262d" stroke-width="1"/>
  <text x="400" y="370" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">Cadena de Formación · Tecnólogo ADSO · Semana 8 de 9</text>
</svg>