<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <!-- Background -->
  <rect width="800" height="500" fill="#0d1117"/>

  <!-- Title -->
  <text x="400" y="36" font-family="Inter, Roboto, sans-serif" font-size="17" font-weight="700" fill="#e6edf3" text-anchor="middle">Categorías de Costo en un Proyecto de Software</text>
  <line x1="60" y1="46" x2="740" y2="46" stroke="#1565C0" stroke-width="1.5" opacity="0.5"/>

  <!-- Central pie-like breakdown bar -->
  <!-- Total width 680, from x=60 -->
  <!-- RH: 75% = 510px, Infra: 10% = 68px, Licencias: 5% = 34px, Contingencia: 10% = 68px -->

  <!-- Bar background -->
  <rect x="60" y="56" width="680" height="48" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>

  <!-- RH bar segment: 75% of 680 = 510 px -->
  <rect x="60" y="56" width="510" height="48" rx="8" fill="#1565C0"/>
  <!-- right side override -->
  <rect x="530" y="56" width="40" height="48" fill="#1565C0"/>

  <!-- Infra segment: 10% = 68px, from x=570 -->
  <rect x="570" y="56" width="68" height="48" fill="#0891b2"/>

  <!-- Licencias: 5% = 34px, from x=638 -->
  <rect x="638" y="56" width="34" height="48" fill="#7c3aed"/>

  <!-- Contingencia: 10% = 68px, from x=672 -->
  <rect x="672" y="56" width="68" height="48" rx="8" fill="#e6953a"/>
  <rect x="672" y="56" width="6" height="48" fill="#e6953a"/>

  <!-- Labels on bar -->
  <text x="315" y="86" font-family="Inter, Roboto, sans-serif" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">Recurso Humano — 70–80%</text>
  <text x="604" y="80" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#e0f2fe" text-anchor="middle">Infra</text>
  <text x="604" y="93" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#e0f2fe" text-anchor="middle">~10%</text>
  <text x="655" y="80" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#ede9fe" text-anchor="middle">Lic.</text>
  <text x="655" y="93" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#ede9fe" text-anchor="middle">~5%</text>
  <text x="706" y="80" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#fff3e0" text-anchor="middle">Conting.</text>
  <text x="706" y="93" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#fff3e0" text-anchor="middle">~10%</text>

  <!-- CATEGORY CARDS -->
  <!-- Card 1: Recurso Humano -->
  <rect x="60" y="124" width="155" height="342" rx="10" fill="#161b22" stroke="#1565C0" stroke-width="1.5"/>
  <rect x="60" y="124" width="155" height="40" rx="10" fill="#1565C0"/>
  <rect x="60" y="150" width="155" height="14" fill="#1565C0"/>
  <text x="137" y="150" font-family="Inter, Roboto, sans-serif" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">A. Recurso Humano</text>
  <text x="137" y="167" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#93c5fd" text-anchor="middle">70 – 80% del total</text>

  <text x="75" y="192" font-family="Inter, Roboto, sans-serif" font-size="10.5" fill="#e6edf3">¿Qué incluye?</text>
  <text x="75" y="210" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#c9d1d9">• Desarrolladores</text>
  <text x="75" y="226" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#c9d1d9">• Analistas</text>
  <text x="75" y="242" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#c9d1d9">• Diseñadores</text>
  <text x="75" y="258" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#c9d1d9">• Testers / QA</text>
  <text x="75" y="274" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#c9d1d9">• Gerente de proyecto</text>

  <rect x="74" y="286" width="127" height="36" rx="6" fill="#0d1117" stroke="#1565C0" stroke-width="1"/>
  <text x="137" y="301" font-family="'Courier New', monospace" font-size="9.5" fill="#42a5f5" text-anchor="middle">Días × Horas</text>
  <text x="137" y="315" font-family="'Courier New', monospace" font-size="9.5" fill="#42a5f5" text-anchor="middle">× Tarifa/hora</text>

  <text x="75" y="344" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#8b949e">Mercado Colombia:</text>
  <text x="75" y="360" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#c9d1d9">Junior: $28k–$40k/h</text>
  <text x="75" y="376" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#c9d1d9">Semi-sr: $45k–$70k/h</text>
  <text x="75" y="392" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#c9d1d9">Senior: $75k–$120k/h</text>
  <text x="75" y="408" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#8b949e">(COP 2025)</text>
  <rect x="74" y="426" width="127" height="28" rx="5" fill="#103050"/>
  <text x="137" y="444" font-family="Inter, Roboto, sans-serif" font-size="10" font-weight="700" fill="#60a5fa" text-anchor="middle">Mayor categoría ✓</text>

  <!-- Card 2: Infraestructura -->
  <rect x="233" y="124" width="155" height="342" rx="10" fill="#161b22" stroke="#0891b2" stroke-width="1.5"/>
  <rect x="233" y="124" width="155" height="40" rx="10" fill="#0891b2"/>
  <rect x="233" y="150" width="155" height="14" fill="#0891b2"/>
  <text x="310" y="150" font-family="Inter, Roboto, sans-serif" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">B. Infraestructura</text>
  <text x="310" y="167" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#e0f2fe" text-anchor="middle">5 – 15% del total</text>

  <text x="248" y="192" font-family="Inter, Roboto, sans-serif" font-size="10.5" fill="#e6edf3">¿Qué incluye?</text>
  <text x="248" y="210" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#c9d1d9">• Servidor / VPS / cloud</text>
  <text x="248" y="226" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#c9d1d9">• Dominio web</text>
  <text x="248" y="242" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#c9d1d9">• Certificado SSL</text>
  <text x="248" y="258" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#c9d1d9">• Almacenamiento (S3)</text>
  <text x="248" y="274" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#c9d1d9">• Email corporativo</text>

  <rect x="247" y="286" width="127" height="36" rx="6" fill="#0d1117" stroke="#0891b2" stroke-width="1"/>
  <text x="310" y="301" font-family="'Courier New', monospace" font-size="9.5" fill="#22d3ee" text-anchor="middle">$costo_mes</text>
  <text x="310" y="315" font-family="'Courier New', monospace" font-size="9.5" fill="#22d3ee" text-anchor="middle">× meses</text>

  <text x="248" y="344" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#8b949e">Ejemplo FerreMax:</text>
  <text x="248" y="360" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#c9d1d9">AWS EC2: $90k–$160k/mes</text>
  <text x="248" y="376" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#c9d1d9">Dominio .com.co: $45k/año</text>
  <text x="248" y="392" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#c9d1d9">SSL (Let's Encrypt): $0</text>
  <text x="248" y="408" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#8b949e">(COP 2025)</text>
  <rect x="247" y="426" width="127" height="28" rx="5" fill="#0c2d36"/>
  <text x="310" y="444" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#22d3ee" text-anchor="middle">Varía por proyecto</text>

  <!-- Card 3: Licencias -->
  <rect x="406" y="124" width="155" height="342" rx="10" fill="#161b22" stroke="#7c3aed" stroke-width="1.5"/>
  <rect x="406" y="124" width="155" height="40" rx="10" fill="#7c3aed"/>
  <rect x="406" y="150" width="155" height="14" fill="#7c3aed"/>
  <text x="483" y="150" font-family="Inter, Roboto, sans-serif" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">C. Licencias</text>
  <text x="483" y="167" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#ede9fe" text-anchor="middle">0 – 10% del total</text>

  <text x="421" y="192" font-family="Inter, Roboto, sans-serif" font-size="10.5" fill="#e6edf3">¿Qué incluye?</text>
  <text x="421" y="210" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#c9d1d9">• IDE / editores pro</text>
  <text x="421" y="226" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#c9d1d9">• BD comercial</text>
  <text x="421" y="242" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#c9d1d9">• Librerías premium</text>
  <text x="421" y="258" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#c9d1d9">• Herramientas diseño</text>
  <text x="421" y="274" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#c9d1d9">• Monitoreo / APM</text>

  <rect x="420" y="286" width="127" height="36" rx="6" fill="#0d1117" stroke="#7c3aed" stroke-width="1"/>
  <text x="483" y="299" font-family="'Courier New', monospace" font-size="9" fill="#a78bfa" text-anchor="middle">Precio licencia</text>
  <text x="483" y="313" font-family="'Courier New', monospace" font-size="9" fill="#a78bfa" text-anchor="middle">× usuarios × meses</text>

  <text x="421" y="344" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#8b949e">Con stack open source:</text>
  <text x="421" y="360" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#56d364">• Python: $0</text>
  <text x="421" y="376" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#56d364">• PostgreSQL: $0</text>
  <text x="421" y="392" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#56d364">• React/Vue: $0</text>
  <text x="421" y="408" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#8b949e">Puede ser $0</text>
  <rect x="420" y="426" width="127" height="28" rx="5" fill="#1c1436"/>
  <text x="483" y="444" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#a78bfa" text-anchor="middle">Frecuente: $0 ✓</text>

  <!-- Card 4: Contingencia -->
  <rect x="579" y="124" width="161" height="342" rx="10" fill="#161b22" stroke="#e6953a" stroke-width="1.5"/>
  <rect x="579" y="124" width="161" height="40" rx="10" fill="#e6953a"/>
  <rect x="579" y="150" width="161" height="14" fill="#e6953a"/>
  <text x="659" y="150" font-family="Inter, Roboto, sans-serif" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">D. Contingencia</text>
  <text x="659" y="167" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#fff3e0" text-anchor="middle">10 – 20% del subtotal</text>

  <text x="594" y="192" font-family="Inter, Roboto, sans-serif" font-size="10.5" fill="#e6edf3">¿Qué cubre?</text>
  <text x="594" y="210" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#c9d1d9">• Requisitos olvidados</text>
  <text x="594" y="226" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#c9d1d9">• Problemas técnicos</text>
  <text x="594" y="242" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#c9d1d9">• Demoras del cliente</text>
  <text x="594" y="258" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#c9d1d9">• Cambios menores</text>
  <text x="594" y="274" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#c9d1d9">• Festivos imprevistos</text>

  <rect x="593" y="286" width="133" height="36" rx="6" fill="#0d1117" stroke="#e6953a" stroke-width="1"/>
  <text x="659" y="299" font-family="'Courier New', monospace" font-size="9" fill="#fb923c" text-anchor="middle">Subtotal (A+B+C)</text>
  <text x="659" y="313" font-family="'Courier New', monospace" font-size="9" fill="#fb923c" text-anchor="middle">× 10% (o 15% / 20%)</text>

  <text x="594" y="344" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#8b949e">Regla práctica:</text>
  <text x="594" y="360" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#c9d1d9">10% → alcance definido</text>
  <text x="594" y="376" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#c9d1d9">15% → some uncertainty</text>
  <text x="594" y="392" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#c9d1d9">20% → primer proyecto</text>
  <text x="594" y="408" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#ef4444">≠ Margen de ganancia</text>
  <rect x="593" y="426" width="133" height="28" rx="5" fill="#2a1c0e"/>
  <text x="659" y="444" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#fb923c" text-anchor="middle">Reserva para riesgos</text>
</svg>
