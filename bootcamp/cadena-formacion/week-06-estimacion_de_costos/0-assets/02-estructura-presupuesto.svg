<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" width="800" height="520">
  <!-- Background -->
  <rect width="800" height="520" fill="#0d1117"/>

  <!-- Title -->
  <text x="400" y="34" font-family="Inter, Roboto, sans-serif" font-size="17" font-weight="700" fill="#e6edf3" text-anchor="middle">Estructura del Presupuesto → Cotización al Cliente</text>
  <line x1="60" y1="44" x2="740" y2="44" stroke="#1565C0" stroke-width="1.5" opacity="0.5"/>

  <!-- Left column: PRESUPUESTO INTERNO -->
  <!-- Box A -->
  <rect x="60" y="60" width="300" height="58" rx="8" fill="#161b22" stroke="#1565C0" stroke-width="1.5"/>
  <rect x="60" y="60" width="10" height="58" rx="4" fill="#1565C0"/>
  <text x="80" y="82" font-family="Inter, Roboto, sans-serif" font-size="11" font-weight="700" fill="#93c5fd">A. Recurso Humano</text>
  <text x="80" y="98" font-family="'Courier New', monospace" font-size="10" fill="#c9d1d9">Dev A: días × 8h × tarifa_A</text>
  <text x="80" y="112" font-family="'Courier New', monospace" font-size="10" fill="#c9d1d9">Dev B: días × 8h × tarifa_B</text>
  <!-- FerreMax value right-aligned -->
  <text x="354" y="94" font-family="'Courier New', monospace" font-size="10" font-weight="700" fill="#42a5f5" text-anchor="end">$40,480,000</text>
  <text x="354" y="110" font-family="'Courier New', monospace" font-size="10" font-weight="700" fill="#42a5f5" text-anchor="end">$34,048,000</text>

  <!-- Arrow A to B -->
  <line x1="210" y1="118" x2="210" y2="136" stroke="#30363d" stroke-width="1.5" stroke-dasharray="3,2"/>
  <polygon points="205,136 210,145 215,136" fill="#30363d"/>

  <!-- Box B -->
  <rect x="60" y="145" width="300" height="46" rx="8" fill="#161b22" stroke="#0891b2" stroke-width="1.5"/>
  <rect x="60" y="145" width="10" height="46" rx="4" fill="#0891b2"/>
  <text x="80" y="166" font-family="Inter, Roboto, sans-serif" font-size="11" font-weight="700" fill="#22d3ee">B. Infraestructura</text>
  <text x="80" y="182" font-family="'Courier New', monospace" font-size="10" fill="#c9d1d9">Servidores + dominio + almacenamiento</text>
  <text x="354" y="178" font-family="'Courier New', monospace" font-size="10" font-weight="700" fill="#22d3ee" text-anchor="end">$597,000</text>

  <!-- Arrow B to C -->
  <line x1="210" y1="191" x2="210" y2="209" stroke="#30363d" stroke-width="1.5" stroke-dasharray="3,2"/>
  <polygon points="205,209 210,218 215,209" fill="#30363d"/>

  <!-- Box C -->
  <rect x="60" y="218" width="300" height="46" rx="8" fill="#161b22" stroke="#7c3aed" stroke-width="1.5"/>
  <rect x="60" y="218" width="10" height="46" rx="4" fill="#7c3aed"/>
  <text x="80" y="239" font-family="Inter, Roboto, sans-serif" font-size="11" font-weight="700" fill="#a78bfa">C. Licencias / Software</text>
  <text x="80" y="255" font-family="'Courier New', monospace" font-size="10" fill="#56d364">Stack open source → sin costo</text>
  <text x="354" y="251" font-family="'Courier New', monospace" font-size="10" font-weight="700" fill="#56d364" text-anchor="end">$0</text>

  <!-- Arrow C to D -->
  <line x1="210" y1="264" x2="210" y2="282" stroke="#30363d" stroke-width="1.5" stroke-dasharray="3,2"/>
  <polygon points="205,282 210,291 215,282" fill="#30363d"/>

  <!-- Box D -->
  <rect x="60" y="291" width="300" height="46" rx="8" fill="#161b22" stroke="#e6953a" stroke-width="1.5"/>
  <rect x="60" y="291" width="10" height="46" rx="4" fill="#e6953a"/>
  <text x="80" y="312" font-family="Inter, Roboto, sans-serif" font-size="11" font-weight="700" fill="#fb923c">D. Contingencia (10%)</text>
  <text x="80" y="328" font-family="'Courier New', monospace" font-size="10" fill="#c9d1d9">(A + B + C) × 10%</text>
  <text x="354" y="324" font-family="'Courier New', monospace" font-size="10" font-weight="700" fill="#fb923c" text-anchor="end">$7,512,500</text>

  <!-- Arrow D to Subtotal -->
  <line x1="210" y1="337" x2="210" y2="355" stroke="#30363d" stroke-width="1.5" stroke-dasharray="3,2"/>
  <polygon points="205,355 210,364 215,355" fill="#30363d"/>

  <!-- Subtotal box -->
  <rect x="60" y="364" width="300" height="36" rx="8" fill="#0d2a47" stroke="#1565C0" stroke-width="1.5"/>
  <text x="80" y="386" font-family="Inter, Roboto, sans-serif" font-size="11" font-weight="700" fill="#93c5fd">Subtotal costos del proyecto</text>
  <text x="354" y="386" font-family="'Courier New', monospace" font-size="11" font-weight="700" fill="#60a5fa" text-anchor="end">$82,637,500</text>

  <!-- INTERNAL label -->
  <rect x="60" y="406" width="300" height="22" rx="4" fill="#0d1117"/>
  <text x="210" y="420" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">← Presupuesto INTERNO (no se muestra al cliente)</text>

  <!-- SEPARATOR / Middle arrow -->
  <line x1="400" y1="60" x2="400" y2="480" stroke="#21262d" stroke-width="1" stroke-dasharray="5,3"/>

  <!-- Right column: COTIZACIÓN AL CLIENTE -->
  <text x="590" y="58" font-family="Inter, Roboto, sans-serif" font-size="11" font-weight="700" fill="#e6edf3" text-anchor="middle">COTIZACIÓN AL CLIENTE</text>

  <!-- Paso 1 -->
  <rect x="440" y="65" width="300" height="52" rx="8" fill="#161b22" stroke="#21262d" stroke-width="1"/>
  <text x="460" y="86" font-family="Inter, Roboto, sans-serif" font-size="10" font-weight="700" fill="#c9d1d9">1. Subtotal costos internos</text>
  <text x="460" y="103" font-family="'Courier New', monospace" font-size="10" fill="#8b949e">A + B + C + D</text>
  <text x="734" y="98" font-family="'Courier New', monospace" font-size="10" fill="#c9d1d9" text-anchor="end">$82,637,500</text>

  <!-- Arrow -->
  <line x1="590" y1="117" x2="590" y2="135" stroke="#30363d" stroke-width="1.5"/>
  <polygon points="585,135 590,144 595,135" fill="#30363d"/>

  <!-- Paso 2 -->
  <rect x="440" y="144" width="300" height="52" rx="8" fill="#161b22" stroke="#21262d" stroke-width="1"/>
  <text x="460" y="165" font-family="Inter, Roboto, sans-serif" font-size="10" font-weight="700" fill="#c9d1d9">2. + Margen de ganancia (20%)</text>
  <text x="460" y="182" font-family="'Courier New', monospace" font-size="10" fill="#56d364">Subtotal × 20% = utilidad empresa</text>
  <text x="734" y="177" font-family="'Courier New', monospace" font-size="10" fill="#56d364" text-anchor="end">+ $16,527,500</text>

  <!-- Arrow -->
  <line x1="590" y1="196" x2="590" y2="214" stroke="#30363d" stroke-width="1.5"/>
  <polygon points="585,214 590,223 595,214" fill="#30363d"/>

  <!-- Total box HIGHLIGHTED -->
  <rect x="440" y="223" width="300" height="62" rx="10" fill="#0d2a47" stroke="#1565C0" stroke-width="2.5"/>
  <text x="590" y="247" font-family="Inter, Roboto, sans-serif" font-size="12" font-weight="700" fill="#93c5fd" text-anchor="middle">TOTAL COTIZACIÓN</text>
  <text x="590" y="270" font-family="'Courier New', monospace" font-size="16" font-weight="700" fill="#42a5f5" text-anchor="middle">$99,165,000</text>

  <!-- Arrow -->
  <line x1="590" y1="285" x2="590" y2="303" stroke="#30363d" stroke-width="1.5"/>
  <polygon points="585,303 590,312 595,303" fill="#30363d"/>

  <!-- Paso 3 -->
  <rect x="440" y="312" width="300" height="46" rx="8" fill="#162116" stroke="#56d364" stroke-width="1"/>
  <text x="460" y="333" font-family="Inter, Roboto, sans-serif" font-size="10" font-weight="700" fill="#56d364">3. Presentar al cliente</text>
  <text x="460" y="349" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#c9d1d9">Valor único, sin detallar tarifas internas</text>

  <!-- Payment schedule -->
  <rect x="440" y="374" width="300" height="88" rx="8" fill="#161b22" stroke="#21262d" stroke-width="1"/>
  <text x="460" y="393" font-family="Inter, Roboto, sans-serif" font-size="10" font-weight="700" fill="#e6edf3">Condiciones de pago habituales:</text>
  <rect x="460" y="402" width="68" height="48" rx="5" fill="#103050"/>
  <text x="494" y="420" font-family="Inter, Roboto, sans-serif" font-size="12" font-weight="700" fill="#60a5fa" text-anchor="middle">30%</text>
  <text x="494" y="434" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#93c5fd" text-anchor="middle">Al inicio</text>
  <text x="494" y="446" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">anticipo</text>
  <rect x="540" y="402" width="68" height="48" rx="5" fill="#0c2d36"/>
  <text x="574" y="420" font-family="Inter, Roboto, sans-serif" font-size="12" font-weight="700" fill="#22d3ee" text-anchor="middle">40%</text>
  <text x="574" y="434" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#67e8f9" text-anchor="middle">Mitad</text>
  <text x="574" y="446" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">hitos</text>
  <rect x="620" y="402" width="68" height="48" rx="5" fill="#0d1f0d"/>
  <text x="654" y="420" font-family="Inter, Roboto, sans-serif" font-size="12" font-weight="700" fill="#56d364" text-anchor="middle">30%</text>
  <text x="654" y="434" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#86efac" text-anchor="middle">Al cierre</text>
  <text x="654" y="446" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">entrega</text>

  <!-- Bottom note -->
  <line x1="60" y1="472" x2="740" y2="472" stroke="#21262d" stroke-width="1"/>
  <text x="400" y="492" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">Cifras del caso FerreMax  ·  Cadena de Formación  ·  Semana 6</text>
</svg>
