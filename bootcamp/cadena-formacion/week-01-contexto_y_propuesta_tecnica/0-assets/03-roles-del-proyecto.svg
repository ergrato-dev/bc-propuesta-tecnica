<svg viewBox="0 0 900 460" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif">
  <rect width="900" height="460" fill="#0d1117"/>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" fill="#e6edf3" font-size="16" font-weight="700">Roles en un Proyecto de Software</text>
  <text x="450" y="50" text-anchor="middle" fill="#8b949e" font-size="11">¿Quién hace qué? — Caso FerreMax S.A.S.</text>

  <!-- SPONSOR / CLIENTE — top center -->
  <rect x="310" y="70" width="280" height="80" rx="8" fill="#0d2137" stroke="#1565C0" stroke-width="2"/>
  <rect x="310" y="70" width="280" height="30" rx="8" fill="#1565C0"/>
  <rect x="310" y="88" width="280" height="12" fill="#1565C0"/>
  <text x="450" y="91" text-anchor="middle" fill="white" font-size="12" font-weight="700">🏢  SPONSOR / CLIENTE</text>
  <text x="450" y="116" text-anchor="middle" fill="#58a6ff" font-size="11" font-weight="600">Carlos Mendoza — Gerente General</text>
  <text x="450" y="131" text-anchor="middle" fill="#7d8590" font-size="10">Aprueba, financia y toma decisiones</text>

  <!-- Line from Sponsor to PM -->
  <line x1="450" y1="150" x2="450" y2="188" stroke="#3d444d" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="445,185 450,195 455,185" fill="#3d444d"/>

  <!-- PM — middle center (highlighted) -->
  <rect x="310" y="194" width="280" height="80" rx="8" fill="#0d2137" stroke="#1565C0" stroke-width="2"/>
  <rect x="310" y="194" width="280" height="30" rx="8" fill="#1565C0"/>
  <rect x="310" y="212" width="280" height="12" fill="#1565C0"/>
  <text x="450" y="215" text-anchor="middle" fill="white" font-size="12" font-weight="700">🗂  PM — PROJECT MANAGER</text>
  <text x="450" y="240" text-anchor="middle" fill="#58a6ff" font-size="11" font-weight="600">Consultor / Equipo ADSO</text>
  <text x="450" y="255" text-anchor="middle" fill="#7d8590" font-size="10">Planifica, coordina y elabora la propuesta técnica</text>

  <!-- 3 lines from PM to bottom roles -->
  <!-- Line to Usuario Clave (left) -->
  <line x1="370" y1="274" x2="180" y2="318" stroke="#3d444d" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- Line to Equipo Dev (center) -->
  <line x1="450" y1="274" x2="450" y2="318" stroke="#3d444d" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- Line to Usuarios Finales (right) -->
  <line x1="530" y1="274" x2="720" y2="318" stroke="#3d444d" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- USUARIO CLAVE — bottom left -->
  <rect x="30" y="318" width="300" height="90" rx="8" fill="#161b22" stroke="#3d444d" stroke-width="1.5"/>
  <rect x="30" y="318" width="300" height="28" rx="8" fill="#21262d"/>
  <rect x="30" y="334" width="300" height="12" fill="#21262d"/>
  <text x="180" y="337" text-anchor="middle" fill="#e6edf3" font-size="11" font-weight="700">👤  USUARIO CLAVE</text>
  <text x="180" y="360" text-anchor="middle" fill="#8b949e" font-size="10.5" font-weight="600">Laura Gómez — Jefa de Bodega</text>
  <text x="180" y="376" text-anchor="middle" fill="#7d8590" font-size="10">Valida requisitos y define prioridades</text>
  <text x="180" y="392" text-anchor="middle" fill="#7d8590" font-size="10">Conoce el negocio por dentro</text>

  <!-- EQUIPO DEV — bottom center -->
  <rect x="300" y="318" width="300" height="90" rx="8" fill="#161b22" stroke="#3d444d" stroke-width="1.5"/>
  <rect x="300" y="318" width="300" height="28" rx="8" fill="#21262d"/>
  <rect x="300" y="334" width="300" height="12" fill="#21262d"/>
  <text x="450" y="337" text-anchor="middle" fill="#e6edf3" font-size="11" font-weight="700">💻  EQUIPO DE DESARROLLO</text>
  <text x="450" y="360" text-anchor="middle" fill="#8b949e" font-size="10.5" font-weight="600">Desarrolladores · QA · DBA</text>
  <text x="450" y="376" text-anchor="middle" fill="#7d8590" font-size="10">Construyen el software</text>
  <text x="450" y="392" text-anchor="middle" fill="#7d8590" font-size="10">Backend · Frontend · Pruebas</text>

  <!-- USUARIOS FINALES — bottom right -->
  <rect x="570" y="318" width="300" height="90" rx="8" fill="#161b22" stroke="#3d444d" stroke-width="1.5"/>
  <rect x="570" y="318" width="300" height="28" rx="8" fill="#21262d"/>
  <rect x="570" y="334" width="300" height="12" fill="#21262d"/>
  <text x="720" y="337" text-anchor="middle" fill="#e6edf3" font-size="11" font-weight="700">🏪  USUARIOS FINALES</text>
  <text x="720" y="360" text-anchor="middle" fill="#8b949e" font-size="10.5" font-weight="600">Pedro · Marcela · Ana Reyes</text>
  <text x="720" y="376" text-anchor="middle" fill="#7d8590" font-size="10">Vendedores y contadora de FerreMax</text>
  <text x="720" y="392" text-anchor="middle" fill="#7d8590" font-size="10">Usan el sistema en el día a día</text>

  <!-- Footer -->
  <text x="450" y="448" text-anchor="middle" fill="#484f58" font-size="10">Bootcamp Propuesta Técnica — Cadena de Formación · Semana 1</text>
</svg>
