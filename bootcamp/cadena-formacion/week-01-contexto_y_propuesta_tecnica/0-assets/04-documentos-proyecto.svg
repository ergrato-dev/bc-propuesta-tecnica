<svg viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif">
  <rect width="900" height="320" fill="#0d1117"/>

  <!-- Title -->
  <text x="450" y="28" text-anchor="middle" fill="#e6edf3" font-size="16" font-weight="700">Cotización · Propuesta Técnica · Contrato</text>
  <text x="450" y="48" text-anchor="middle" fill="#8b949e" font-size="11">Tres documentos distintos en el ciclo de venta de software</text>

  <!-- Flow label: "FLUJO TÍPICO" -->
  <text x="450" y="74" text-anchor="middle" fill="#7d8590" font-size="10" font-style="italic">Flujo típico: el cliente consulta → recibe cotización → aprueba propuesta → firma contrato → inicia desarrollo</text>

  <!-- Card 1: COTIZACIÓN -->
  <rect x="30" y="88" width="248" height="184" rx="8" fill="#161b22" stroke="#3d444d" stroke-width="1.5"/>
  <rect x="30" y="88" width="248" height="36" rx="8" fill="#21262d"/>
  <rect x="30" y="112" width="248" height="12" fill="#21262d"/>
  <text x="154" y="113" text-anchor="middle" fill="#e6edf3" font-size="12" font-weight="700">📋  COTIZACIÓN</text>
  <text x="154" y="138" text-anchor="middle" fill="#8b949e" font-size="10">Nivel de detalle: Bajo</text>
  <!-- detail bar low -->
  <rect x="54" y="148" width="200" height="8" rx="3" fill="#21262d"/>
  <rect x="54" y="148" width="60" height="8" rx="3" fill="#3d444d"/>
  <line x1="54" y1="164" x2="232" y2="164" stroke="#21262d" stroke-width="1"/>
  <text x="54" y="181" fill="#7d8590" font-size="10">• Solo precio y entregables</text>
  <text x="54" y="197" fill="#7d8590" font-size="10">• Sin metodología ni equipo</text>
  <text x="54" y="213" fill="#7d8590" font-size="10">• Sin cronograma ni riesgos</text>
  <text x="54" y="229" fill="#7d8590" font-size="10">• Respuesta rápida al cliente</text>
  <!-- example -->
  <rect x="46" y="244" width="216" height="20" rx="3" fill="#0d1117" stroke="#21262d" stroke-width="1"/>
  <text x="154" y="258" text-anchor="middle" fill="#484f58" font-size="9" font-style="italic">"Sistema: $7.200.000 – entrega 3 meses"</text>

  <!-- Arrow 1→2 -->
  <line x1="282" y1="180" x2="296" y2="180" stroke="#3d444d" stroke-width="2"/>
  <polygon points="296,175 308,180 296,185" fill="#3d444d"/>

  <!-- Card 2: PROPUESTA TÉCNICA (highlighted) -->
  <rect x="308" y="80" width="284" height="200" rx="8" fill="#0d2137" stroke="#1565C0" stroke-width="2"/>
  <rect x="308" y="80" width="284" height="36" rx="8" fill="#1565C0"/>
  <rect x="308" y="104" width="284" height="12" fill="#1565C0"/>
  <text x="450" y="105" text-anchor="middle" fill="white" font-size="12" font-weight="700">📑  PROPUESTA TÉCNICA</text>
  <text x="450" y="130" text-anchor="middle" fill="#58a6ff" font-size="10">Nivel de detalle: Alto  ★ Lo que construyes aquí</text>
  <!-- detail bar high -->
  <rect x="334" y="140" width="228" height="8" rx="3" fill="#1565C0" fill-opacity="0.2"/>
  <rect x="334" y="140" width="184" height="8" rx="3" fill="#1565C0"/>
  <line x1="334" y1="156" x2="576" y2="156" stroke="#1565C0" stroke-width="1" stroke-opacity="0.4"/>
  <text x="334" y="173" fill="#7d8590" font-size="10">• Alcance detallado (qué SÍ / qué NO)</text>
  <text x="334" y="189" fill="#7d8590" font-size="10">• Metodología y tecnologías</text>
  <text x="334" y="205" fill="#7d8590" font-size="10">• Cronograma y equipo asignado</text>
  <text x="334" y="221" fill="#7d8590" font-size="10">• Presupuesto justificado</text>
  <text x="334" y="237" fill="#7d8590" font-size="10">• Gestión de riesgos</text>
  <!-- example -->
  <rect x="326" y="252" width="248" height="20" rx="3" fill="#1565C0" fill-opacity="0.1" stroke="#1565C0" stroke-width="1"/>
  <text x="450" y="266" text-anchor="middle" fill="#58a6ff" font-size="9" font-style="italic">"Documento de 15 páginas que el cliente aprueba"</text>

  <!-- Arrow 2→3 -->
  <line x1="596" y1="180" x2="610" y2="180" stroke="#3d444d" stroke-width="2"/>
  <polygon points="610,175 622,180 610,185" fill="#3d444d"/>

  <!-- Card 3: CONTRATO -->
  <rect x="622" y="88" width="248" height="184" rx="8" fill="#161b22" stroke="#3d444d" stroke-width="1.5"/>
  <rect x="622" y="88" width="248" height="36" rx="8" fill="#21262d"/>
  <rect x="622" y="112" width="248" height="12" fill="#21262d"/>
  <text x="746" y="113" text-anchor="middle" fill="#e6edf3" font-size="12" font-weight="700">📜  CONTRATO</text>
  <text x="746" y="138" text-anchor="middle" fill="#8b949e" font-size="10">Nivel de detalle: Muy alto (legal)</text>
  <!-- detail bar very high -->
  <rect x="646" y="148" width="200" height="8" rx="3" fill="#21262d"/>
  <rect x="646" y="148" width="196" height="8" rx="3" fill="#3d444d"/>
  <line x1="646" y1="164" x2="826" y2="164" stroke="#21262d" stroke-width="1"/>
  <text x="646" y="181" fill="#7d8590" font-size="10">• Formaliza la propuesta técnica</text>
  <text x="646" y="197" fill="#7d8590" font-size="10">• Establece obligaciones legales</text>
  <text x="646" y="213" fill="#7d8590" font-size="10">• Define penalidades y garantías</text>
  <text x="646" y="229" fill="#7d8590" font-size="10">• Firmado por ambas partes</text>
  <!-- example -->
  <rect x="638" y="244" width="216" height="20" rx="3" fill="#0d1117" stroke="#21262d" stroke-width="1"/>
  <text x="746" y="258" text-anchor="middle" fill="#484f58" font-size="9" font-style="italic">"Documento legal con firma y notariado"</text>

  <!-- Footer -->
  <text x="450" y="308" text-anchor="middle" fill="#484f58" font-size="10">Bootcamp Propuesta Técnica — Cadena de Formación · Semana 1</text>
</svg>
