<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520">
  <!-- Background -->
  <rect width="900" height="520" fill="#0d1117"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-family="Inter, Roboto, Open Sans, sans-serif" font-size="20" font-weight="700" fill="#e6edf3">Técnicas de Levantamiento de Requisitos</text>

  <!-- ===== Card 1: Entrevista ===== -->
  <rect x="40" y="60" width="190" height="200" rx="8" fill="#161b22" stroke="#1565C0" stroke-width="2"/>
  <rect x="40" y="60" width="190" height="44" rx="8" fill="#1565C0"/>
  <rect x="40" y="88" width="190" height="16" fill="#1565C0"/>
  <text x="135" y="87" text-anchor="middle" font-family="Inter, Roboto, Open Sans, sans-serif" font-size="14" font-weight="700" fill="#ffffff">Entrevista</text>
  <text x="135" y="118" text-anchor="middle" font-family="Inter, Roboto, Open Sans, sans-serif" font-size="26" fill="#42a5f5">🎤</text>
  <text x="135" y="148" text-anchor="middle" font-family="Inter, Roboto, Open Sans, sans-serif" font-size="11" fill="#8b949e">Conversación</text>
  <text x="135" y="163" text-anchor="middle" font-family="Inter, Roboto, Open Sans, sans-serif" font-size="11" fill="#8b949e">estructurada con</text>
  <text x="135" y="178" text-anchor="middle" font-family="Inter, Roboto, Open Sans, sans-serif" font-size="11" fill="#8b949e">el cliente</text>
  <rect x="55" y="192" width="160" height="28" rx="4" fill="#1e2a38"/>
  <text x="135" y="211" text-anchor="middle" font-family="Inter, Roboto, Open Sans, sans-serif" font-size="10" fill="#79c0ff">Mejor para explorar</text>
  <rect x="55" y="226" width="160" height="20" rx="10" fill="#1565C0"/>
  <text x="135" y="240" text-anchor="middle" font-family="Inter, Roboto, Open Sans, sans-serif" font-size="10" font-weight="700" fill="#ffffff">⭐ Uso frecuente</text>

  <!-- ===== Card 2: Cuestionario ===== -->
  <rect x="250" y="60" width="190" height="200" rx="8" fill="#161b22" stroke="#0288d1" stroke-width="2"/>
  <rect x="250" y="60" width="190" height="44" rx="8" fill="#0288d1"/>
  <rect x="250" y="88" width="190" height="16" fill="#0288d1"/>
  <text x="345" y="87" text-anchor="middle" font-family="Inter, Roboto, Open Sans, sans-serif" font-size="14" font-weight="700" fill="#ffffff">Cuestionario</text>
  <text x="345" y="118" text-anchor="middle" font-family="Inter, Roboto, Open Sans, sans-serif" font-size="26" fill="#4fc3f7">📋</text>
  <text x="345" y="148" text-anchor="middle" font-family="Inter, Roboto, Open Sans, sans-serif" font-size="11" fill="#8b949e">Formulario enviado</text>
  <text x="345" y="163" text-anchor="middle" font-family="Inter, Roboto, Open Sans, sans-serif" font-size="11" fill="#8b949e">a múltiples</text>
  <text x="345" y="178" text-anchor="middle" font-family="Inter, Roboto, Open Sans, sans-serif" font-size="11" fill="#8b949e">usuarios a la vez</text>
  <rect x="265" y="192" width="160" height="28" rx="4" fill="#0d2233"/>
  <text x="345" y="211" text-anchor="middle" font-family="Inter, Roboto, Open Sans, sans-serif" font-size="10" fill="#4fc3f7">Muchos usuarios</text>
  <rect x="265" y="226" width="160" height="20" rx="10" fill="#0288d1"/>
  <text x="345" y="240" text-anchor="middle" font-family="Inter, Roboto, Open Sans, sans-serif" font-size="10" font-weight="700" fill="#ffffff">Google Forms / libre</text>

  <!-- ===== Card 3: Observación ===== -->
  <rect x="460" y="60" width="190" height="200" rx="8" fill="#161b22" stroke="#2e7d32" stroke-width="2"/>
  <rect x="460" y="60" width="190" height="44" rx="8" fill="#2e7d32"/>
  <rect x="460" y="88" width="190" height="16" fill="#2e7d32"/>
  <text x="555" y="87" text-anchor="middle" font-family="Inter, Roboto, Open Sans, sans-serif" font-size="14" font-weight="700" fill="#ffffff">Observación</text>
  <text x="555" y="118" text-anchor="middle" font-family="Inter, Roboto, Open Sans, sans-serif" font-size="26" fill="#81c784">👁️</text>
  <text x="555" y="148" text-anchor="middle" font-family="Inter, Roboto, Open Sans, sans-serif" font-size="11" fill="#8b949e">Visitar al cliente</text>
  <text x="555" y="163" text-anchor="middle" font-family="Inter, Roboto, Open Sans, sans-serif" font-size="11" fill="#8b949e">y ver cómo</text>
  <text x="555" y="178" text-anchor="middle" font-family="Inter, Roboto, Open Sans, sans-serif" font-size="11" fill="#8b949e">trabaja realmente</text>
  <rect x="475" y="192" width="160" height="28" rx="4" fill="#0d1f10"/>
  <text x="555" y="211" text-anchor="middle" font-family="Inter, Roboto, Open Sans, sans-serif" font-size="10" fill="#81c784">Revela lo implícito</text>
  <rect x="475" y="226" width="160" height="20" rx="10" fill="#2e7d32"/>
  <text x="555" y="240" text-anchor="middle" font-family="Inter, Roboto, Open Sans, sans-serif" font-size="10" font-weight="700" fill="#ffffff">Presencial / remoto</text>

  <!-- ===== Card 4: Análisis de documentos ===== -->
  <rect x="670" y="60" width="190" height="200" rx="8" fill="#161b22" stroke="#e65100" stroke-width="2"/>
  <rect x="670" y="60" width="190" height="44" rx="8" fill="#e65100"/>
  <rect x="670" y="88" width="190" height="16" fill="#e65100"/>
  <text x="765" y="87" text-anchor="middle" font-family="Inter, Roboto, Open Sans, sans-serif" font-size="14" font-weight="700" fill="#ffffff">Análisis Docs.</text>
  <text x="765" y="118" text-anchor="middle" font-family="Inter, Roboto, Open Sans, sans-serif" font-size="26" fill="#ffb74d">📂</text>
  <text x="765" y="148" text-anchor="middle" font-family="Inter, Roboto, Open Sans, sans-serif" font-size="11" fill="#8b949e">Estudiar Excel,</text>
  <text x="765" y="163" text-anchor="middle" font-family="Inter, Roboto, Open Sans, sans-serif" font-size="11" fill="#8b949e">formularios y</text>
  <text x="765" y="178" text-anchor="middle" font-family="Inter, Roboto, Open Sans, sans-serif" font-size="11" fill="#8b949e">manuales actuales</text>
  <rect x="685" y="192" width="160" height="28" rx="4" fill="#1f1509"/>
  <text x="765" y="211" text-anchor="middle" font-family="Inter, Roboto, Open Sans, sans-serif" font-size="10" fill="#ffb74d">Sin interrumpir</text>
  <rect x="685" y="226" width="160" height="20" rx="10" fill="#e65100"/>
  <text x="765" y="240" text-anchor="middle" font-family="Inter, Roboto, Open Sans, sans-serif" font-size="10" font-weight="700" fill="#ffffff">Revela vocabulario</text>

  <!-- ===== Selector table ===== -->
  <rect x="40" y="285" width="820" height="200" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="450" y="310" text-anchor="middle" font-family="Inter, Roboto, Open Sans, sans-serif" font-size="14" font-weight="700" fill="#e6edf3">¿Cuándo usar cada técnica?</text>

  <!-- Table header -->
  <rect x="55" y="320" width="420" height="22" rx="3" fill="#1e2a38"/>
  <rect x="485" y="320" width="360" height="22" rx="3" fill="#1e2a38"/>
  <text x="265" y="335" text-anchor="middle" font-family="Inter, Roboto, Open Sans, sans-serif" font-size="11" font-weight="600" fill="#79c0ff">Situación</text>
  <text x="665" y="335" text-anchor="middle" font-family="Inter, Roboto, Open Sans, sans-serif" font-size="11" font-weight="600" fill="#79c0ff">Técnica recomendada</text>

  <!-- Row 1 -->
  <text x="65" y="360" font-family="Inter, Roboto, Open Sans, sans-serif" font-size="11" fill="#8b949e">Primera reunión — explorar el problema</text>
  <text x="495" y="360" font-family="Inter, Roboto, Open Sans, sans-serif" font-size="11" fill="#42a5f5">🎤 Entrevista abierta</text>

  <!-- Row 2 -->
  <text x="65" y="380" font-family="Inter, Roboto, Open Sans, sans-serif" font-size="11" fill="#8b949e">Muchos usuarios finales con opiniones distintas</text>
  <text x="495" y="380" font-family="Inter, Roboto, Open Sans, sans-serif" font-size="11" fill="#4fc3f7">📋 Cuestionario (Google Forms)</text>

  <!-- Row 3 -->
  <text x="65" y="400" font-family="Inter, Roboto, Open Sans, sans-serif" font-size="11" fill="#8b949e">El cliente no sabe describir bien su proceso</text>
  <text x="495" y="400" font-family="Inter, Roboto, Open Sans, sans-serif" font-size="11" fill="#81c784">👁️ Observación directa</text>

  <!-- Row 4 -->
  <text x="65" y="420" font-family="Inter, Roboto, Open Sans, sans-serif" font-size="11" fill="#8b949e">El cliente tiene formularios / reportes / Excel</text>
  <text x="495" y="420" font-family="Inter, Roboto, Open Sans, sans-serif" font-size="11" fill="#ffb74d">📂 Análisis de documentos</text>

  <!-- Row 5 -->
  <text x="65" y="440" font-family="Inter, Roboto, Open Sans, sans-serif" font-size="11" fill="#8b949e">Proyectos SENA (recomendación)</text>
  <text x="495" y="440" font-family="Inter, Roboto, Open Sans, sans-serif" font-size="11" fill="#e6edf3">🎤 Entrevista + 📂 Análisis de documentos</text>

  <!-- divider line -->
  <line x1="480" y1="320" x2="480" y2="460" stroke="#30363d" stroke-width="1"/>

  <!-- Footer -->
  <text x="450" y="510" text-anchor="middle" font-family="Inter, Roboto, Open Sans, sans-serif" font-size="10" fill="#484f58">Bootcamp Propuesta Técnica · Cadena de Formación · Semana 2</text>
</svg>
